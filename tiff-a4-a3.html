<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TIFF Сортировщик | A4 / A3</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/pako@2/dist/pako.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/utif@3.1.0/UTIF.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <style>
        body { font-family: system-ui, -apple-system, sans-serif; }
        .dropzone { transition: all 0.2s; }
        .dropzone.dragover { background-color: #27251f; border-color: #c9a227; }
    </style>
</head>
<body class="bg-[#1a120b] text-[#e8d5b7]">
    <div class="max-w-7xl mx-auto p-8">
        <div class="flex items-center justify-between mb-8">
            <div>
                <h1 class="text-4xl font-bold text-[#c9a227]">TIFF Сортировщик A4 / A3</h1>
                <p class="text-[#8b5e3c]">Автосортировка по физическому размеру в мм</p>
            </div>
            <a href="index.html" class="px-5 py-2 border border-[#8b5e3c] rounded-2xl hover:bg-[#2c2118]">← Назад в хаб</a>
        </div>

        <!-- Upload -->
        <div id="dropzone" class="dropzone border-2 border-dashed border-[#8b5e3c] rounded-3xl p-10 text-center cursor-pointer hover:border-[#c9a227]">
            <div class="text-6xl mb-4">📄</div>
            <h3 class="text-2xl font-semibold mb-2">Перетащите TIFF файлы</h3>
            <p class="text-[#8b5e3c] mb-4">или нажмите для выбора</p>
            <input type="file" id="fileInput" multiple accept=".tif,.tiff,image/tiff" class="hidden">
            <button onclick="document.getElementById('fileInput').click()" class="px-8 py-3 bg-[#c9a227] text-[#1a120b] font-semibold rounded-2xl">
                Выбрать файлы
            </button>
        </div>

        <div id="controls" class="hidden mt-6 flex gap-4">
            <button onclick="analyzeFiles()" class="flex-1 py-4 bg-[#c9a227] hover:bg-[#d4af37] text-[#1a120b] font-bold text-xl rounded-2xl">
                🔍 Проанализировать и отсортировать
            </button>
            <button onclick="resetAll()" class="px-8 py-4 border border-[#8b5e3c] rounded-2xl hover:bg-[#2c2118]">
                Сбросить всё
            </button>
        </div>

        <!-- Results -->
        <div id="results" class="hidden mt-8 grid grid-cols-1 md:grid-cols-3 gap-6">
            
            <!-- A4 -->
            <div class="bg-[#2c2118] border border-[#8b5e3c] rounded-3xl p-6">
                <div class="flex items-center justify-between mb-4">
                    <div class="flex items-center gap-3">
                        <span class="text-2xl font-bold text-emerald-400">A4</span>
                        <span id="a4-count" class="text-sm bg-emerald-900 text-emerald-300 px-3 py-1 rounded-full">0 стр.</span>
                    </div>
                    <button onclick="downloadGroup('a4')" class="px-4 py-1.5 bg-emerald-600 hover:bg-emerald-500 rounded-2xl text-xs font-medium">Скачать PDF</button>
                </div>
                <div id="a4-list" class="min-h-[180px] bg-[#1f1812] rounded-2xl p-3 text-sm space-y-1.5 overflow-auto max-h-[420px]">
                    <div class="text-[#8b5e3c] text-center py-6 text-xs">Здесь будут A4</div>
                </div>
            </div>

            <!-- A3 -->
            <div class="bg-[#2c2118] border border-[#8b5e3c] rounded-3xl p-6">
                <div class="flex items-center justify-between mb-4">
                    <div class="flex items-center gap-3">
                        <span class="text-2xl font-bold text-amber-400">A3</span>
                        <span id="a3-count" class="text-sm bg-amber-900 text-amber-300 px-3 py-1 rounded-full">0 стр.</span>
                    </div>
                    <button onclick="downloadGroup('a3')" class="px-4 py-1.5 bg-amber-600 hover:bg-amber-500 rounded-2xl text-xs font-medium">Скачать PDF</button>
                </div>
                <div id="a3-list" class="min-h-[180px] bg-[#1f1812] rounded-2xl p-3 text-sm space-y-1.5 overflow-auto max-h-[420px]">
                    <div class="text-[#8b5e3c] text-center py-6 text-xs">Здесь будут A3</div>
                </div>
            </div>

            <!-- Other -->
            <div class="bg-[#2c2118] border border-[#8b5e3c] rounded-3xl p-6">
                <div class="flex items-center justify-between mb-4">
                    <div class="flex items-center gap-3">
                        <span class="text-2xl font-bold text-slate-400">Другое</span>
                        <span id="other-count" class="text-sm bg-slate-800 text-slate-300 px-3 py-1 rounded-full">0 стр.</span>
                    </div>
                </div>
                <div id="other-list" class="min-h-[180px] bg-[#1f1812] rounded-2xl p-3 text-sm space-y-1.5 overflow-auto max-h-[420px]">
                    <div class="text-[#8b5e3c] text-center py-6 text-xs">Здесь всё остальное</div>
                </div>
            </div>

        </div>

        <div class="mt-6 text-xs text-[#8b5e3c] text-center">
            Сортировка строго по рассчитанному размеру в мм (как показано в списке).
        </div>
    </div>

    <script>
        let filesData = [];

        function initDropzone() {
            const dropzone = document.getElementById('dropzone');
            const fileInput = document.getElementById('fileInput');

            dropzone.addEventListener('click', () => fileInput.click());
            dropzone.addEventListener('dragover', e => { e.preventDefault(); dropzone.classList.add('dragover'); });
            dropzone.addEventListener('dragleave', () => dropzone.classList.remove('dragover'));
            dropzone.addEventListener('drop', e => {
                e.preventDefault();
                dropzone.classList.remove('dragover');
                if (e.dataTransfer.files.length > 0) handleFiles(e.dataTransfer.files);
            });
            fileInput.addEventListener('change', e => { if (e.target.files.length > 0) handleFiles(e.target.files); });
        }

        function handleFiles(fileList) {
            filesData = [];
            for (let file of fileList) {
                const name = file.name.toLowerCase();
                if (file.type === 'image/tiff' || name.endsWith('.tif') || name.endsWith('.tiff')) {
                    filesData.push({ file });
                }
            }
            if (filesData.length === 0) { alert('Выберите TIFF файлы'); return; }
            document.getElementById('controls').classList.remove('hidden');
            document.getElementById('results').classList.add('hidden');
        }

        function getBestPhysicalSize(widthPx, heightPx, ifd) {
            let xRes = 300, yRes = 300;
            const processTag = (val) => {
                if (!val) return null;
                if (Array.isArray(val) && val.length >= 2 && val[1] !== 0) return val[0] / val[1];
                if (typeof val === 'number') return val;
                if (val && val[0]) return val[0];
                return null;
            };
            const xr = processTag(ifd['282']);
            const yr = processTag(ifd['283']);
            if (xr) xRes = xr;
            if (yr) yRes = yr;

            let unit = 2;
            if (ifd['296']) {
                const u = ifd['296'];
                if (Array.isArray(u)) unit = u[0] || 2;
                else if (typeof u === 'number') unit = u;
            }

            let wMM, hMM;
            if (unit === 3) {
                wMM = (widthPx / xRes) * 10;
                hMM = (heightPx / yRes) * 10;
            } else {
                wMM = (widthPx / xRes) * 25.4;
                hMM = (heightPx / yRes) * 25.4;
            }

            // Проверка качества
            const short = Math.min(wMM, hMM);
            const long = Math.max(wMM, hMM);
            const ratio = long / short;
            const isGood = Math.abs(ratio - 1.414) < 0.1 && short > 150 && short < 350;

            if (isGood) {
                return { wMM, hMM, xRes: Math.round(xRes), yRes: Math.round(yRes), unit, source: 'meta' };
            }

            // Fallback
            const common = [150, 200, 300, 400];
            let best = { wMM, hMM, xRes: Math.round(xRes), yRes: Math.round(yRes), unit, source: 'meta' };
            let bestScore = isGood ? 0 : 999;

            for (const dpi of common) {
                const ww = (widthPx / dpi) * 25.4;
                const hh = (heightPx / dpi) * 25.4;
                const ss = Math.min(ww, hh);
                const ll = Math.max(ww, hh);
                const rr = ll / ss;
                const good = Math.abs(rr - 1.414) < 0.1 && ss > 150 && ss < 350;
                const score = good ? 0 : 5;

                if (score < bestScore) {
                    bestScore = score;
                    best = { wMM: ww, hMM: hh, xRes: dpi, yRes: dpi, unit: 2, source: 'fallback' };
                }
            }
            return best;
        }

        async function analyzeFiles() {
            const resultsDiv = document.getElementById('results');
            resultsDiv.classList.remove('hidden');

            ['a4-list','a3-list','other-list'].forEach(id => document.getElementById(id).innerHTML = '');
            let counts = { a4: 0, a3: 0, other: 0 };

            for (let item of filesData) {
                try {
                    const buffer = await item.file.arrayBuffer();
                    const ifds = UTIF.decode(buffer);

                    for (let i = 0; i < ifds.length; i++) {
                        const ifd = ifds[i];
                        try { UTIF.decodeImage(buffer, ifd); } catch(e) {}

                        const width = ifd.width || ifd.ImageWidth || 0;
                        const height = ifd.height || ifd.ImageLength || 0;
                        if (!width || !height) continue;

                        const sizeInfo = getBestPhysicalSize(width, height, ifd);
                        const classification = classifyByMM(sizeInfo.wMM, sizeInfo.hMM);

                        const pageInfo = {
                            fileName: item.file.name,
                            pageIndex: i,
                            widthMM: Math.round(sizeInfo.wMM),
                            heightMM: Math.round(sizeInfo.hMM),
                            xRes: sizeInfo.xRes,
                            yRes: sizeInfo.yRes,
                            source: sizeInfo.source,
                            ...classification
                        };

                        if (classification.format === 'A4') {
                            counts.a4++;
                            addToList('a4-list', pageInfo);
                        } else if (classification.format === 'A3') {
                            counts.a3++;
                            addToList('a3-list', pageInfo);
                        } else {
                            counts.other++;
                            addToList('other-list', pageInfo);
                        }
                    }
                } catch (err) {
                    const div = document.createElement('div');
                    div.className = 'text-red-400 text-xs p-2';
                    div.textContent = 'Ошибка: ' + item.file.name;
                    document.getElementById('other-list').appendChild(div);
                }
            }

            document.getElementById('a4-count').textContent = counts.a4 + ' стр.';
            document.getElementById('a3-count').textContent = counts.a3 + ' стр.';
            document.getElementById('other-count').textContent = counts.other + ' стр.';
        }

        function classifyByMM(wMM, hMM) {
            const short = Math.round(Math.min(wMM, hMM));
            const long = Math.round(Math.max(wMM, hMM));

            // Чисто по мм (как просил пользователь)
            if (short >= 200 && short <= 225 && long >= 285 && long <= 315) {
                return { format: 'A4', orientation: wMM < hMM ? 'portrait' : 'landscape' };
            }
            if (short >= 285 && short <= 315 && long >= 405 && long <= 435) {
                return { format: 'A3', orientation: wMM < hMM ? 'portrait' : 'landscape' };
            }

            return { format: 'Other', orientation: wMM < hMM ? 'portrait' : 'landscape' };
        }

        function addToList(listId, pageInfo) {
            const container = document.getElementById(listId);
            const div = document.createElement('div');
            div.className = 'bg-[#2c2118] px-3 py-1.5 rounded-xl text-xs flex justify-between items-center';

            let extra = '';
            if (pageInfo.format === 'Other') {
                extra = ` • ${pageInfo.source} DPI~${pageInfo.xRes}`;
            }

            div.innerHTML = `
                <div class="min-w-0 flex-1">
                    <div class="font-medium truncate">${pageInfo.fileName} (стр. ${pageInfo.pageIndex + 1})</div>
                    <div class="text-[#8b5e3c]">${pageInfo.widthMM}×${pageInfo.heightMM} мм${extra}</div>
                </div>
                <div class="ml-2 text-[10px] px-2 py-0.5 rounded bg-[#1f1812]">${pageInfo.format}</div>
            `;
            container.appendChild(div);
        }

        function downloadGroup(group) {
            alert('Экспорт PDF будет позже. Пока сортировка по мм работает.');
        }

        function resetAll() {
            filesData = [];
            document.getElementById('controls').classList.add('hidden');
            document.getElementById('results').classList.add('hidden');
            ['a4-list','a3-list','other-list'].forEach(id => document.getElementById(id).innerHTML = '');
            document.getElementById('fileInput').value = '';
        }

        function init() {
            initDropzone();
            console.log('%c[TIFF Sorter] Готов — сортировка строго по мм', 'color:#c9a227');
        }

        window.onload = init;
    </script>
</body>
</html>
