<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Совместная Доска • WebRTC</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Roboto+Mono:wght@400;500&display=swap');
        
        :root {
            --bg: #0a1628;
            --card: #132238;
            --accent: #00d4ff;
        }
        
        * { box-sizing: border-box; margin: 0; padding: 0; }
        
        body {
            background: linear-gradient(135deg, #0a1628 0%, #0d1b2a 100%);
            color: #e3f2fd;
            font-family: 'Inter', system_ui, sans-serif;
            min-height: 100vh;
            overflow: hidden;
        }
        
        .container {
            display: flex;
            flex-direction: column;
            height: 100vh;
        }
        
        header {
            padding: 14px 24px;
            background: #132238;
            border-bottom: 1px solid rgba(0, 212, 255, 0.1);
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-shrink: 0;
            z-index: 10;
        }
        
        .header-left {
            display: flex;
            align-items: center;
            gap: 16px;
        }
        
        .title {
            font-size: 1.55rem;
            font-weight: 700;
            background: linear-gradient(90deg, #00d4ff, #00bcd4);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        
        .status {
            padding: 8px 16px;
            background: #0f1c2e;
            border-radius: 9999px;
            font-size: 0.9rem;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        
        .status-dot {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            background: #ff9800;
        }
        
        .status.connected .status-dot {
            background: #4caf50;
            box-shadow: 0 0 8px #4caf50;
        }
        
        .main {
            flex: 1;
            display: flex;
            overflow: hidden;
            min-height: 0;
        }
        
        .toolbar {
            width: 240px;
            background: #132238;
            border-right: 1px solid rgba(0, 212, 255, 0.1);
            padding: 18px 16px;
            display: flex;
            flex-direction: column;
            gap: 18px;
            flex-shrink: 0;
            overflow-y: auto;
        }
        
        .toolbar h3 {
            font-size: 0.9rem;
            color: #90caf9;
            margin-bottom: 6px;
            font-weight: 600;
        }
        
        .color-grid {
            display: grid;
            grid-template-columns: repeat(6, 1fr);
            gap: 8px;
        }
        
        .color-btn {
            width: 36px;
            height: 36px;
            border-radius: 8px;
            border: 3px solid #37474f;
            cursor: pointer;
            transition: all 0.15s;
        }
        
        .color-btn.active {
            border-color: white;
            box-shadow: 0 0 0 3px rgba(255,255,255,0.35);
            transform: scale(1.1);
        }
        
        .brush-types {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
        }
        
        .brush-btn {
            flex: 1;
            min-width: 52px;
            padding: 8px 10px;
            font-size: 0.8rem;
            background: #0f1c2e;
            border: 1px solid #37474f;
            border-radius: 8px;
            color: #b0bec5;
            cursor: pointer;
            transition: all 0.15s;
            text-align: center;
        }
        
        .brush-btn.active {
            background: #00bcd4;
            color: white;
            border-color: #00d4ff;
        }
        
        .thickness-slider {
            width: 100%;
        }
        
        .thickness-value {
            text-align: center;
            font-size: 0.85rem;
            color: #90caf9;
            margin-top: 3px;
        }
        
        .btn {
            background: linear-gradient(135deg, #00bcd4, #0097a7);
            color: white;
            border: none;
            padding: 11px 18px;
            font-size: 0.9rem;
            font-weight: 600;
            border-radius: 10px;
            cursor: pointer;
            transition: all 0.2s;
            width: 100%;
        }
        
        .btn:hover {
            transform: translateY(-2px);
        }
        
        .btn-danger {
            background: linear-gradient(135deg, #c62828, #b71c1c);
        }
        
        .canvas-wrapper {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 16px;
            background: #0a1628;
            min-width: 0;
        }
        
        #whiteboard {
            border: 5px solid #00d4ff;
            border-radius: 18px;
            box-shadow: 0 0 50px rgba(0, 212, 255, 0.25),
                        inset 0 0 80px rgba(0,0,0,0.5);
            background: #0d1b2a;
            cursor: crosshair;
            max-width: 100%;
            max-height: 100%;
        }
        
        .chat-panel {
            width: 260px;
            background: #132238;
            border-left: 1px solid rgba(0, 212, 255, 0.1);
            display: flex;
            flex-direction: column;
            flex-shrink: 0;
        }
        
        .chat-header {
            padding: 14px 16px;
            font-weight: 600;
            color: #90caf9;
            border-bottom: 1px solid rgba(0, 212, 255, 0.1);
            font-size: 0.95rem;
        }
        
        #chatLog {
            flex: 1;
            overflow-y: auto;
            padding: 12px;
            font-size: 0.9rem;
            line-height: 1.4;
        }
        
        #chatLog div {
            margin-bottom: 8px;
            padding: 6px 10px;
            border-radius: 8px;
        }
        
        #chatLog .me {
            background: #004d40;
            text-align: right;
        }
        
        #chatLog .opponent {
            background: #1e3a5f;
        }
        
        #chatLog .system {
            color: #78909c;
            font-style: italic;
            font-size: 0.85rem;
        }
        
        .chat-input {
            padding: 12px;
            border-top: 1px solid rgba(0, 212, 255, 0.1);
            display: flex;
            gap: 8px;
        }
        
        #chatInput {
            flex: 1;
            padding: 10px 14px;
            border-radius: 9999px;
            border: 2px solid #37474f;
            background: #0a1628;
            color: #e3f2fd;
            font-size: 0.9rem;
        }
        
        .connection-panel {
            padding: 16px 20px;
            background: #132238;
            border-top: 1px solid rgba(0, 212, 255, 0.1);
            flex-shrink: 0;
        }
        
        .steps {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
            gap: 14px;
        }
        
        .step {
            background: #0f1c2e;
            border-radius: 12px;
            padding: 14px;
        }
        
        .step h4 {
            font-size: 0.85rem;
            color: #90caf9;
            margin-bottom: 8px;
        }
        
        textarea {
            width: 100%;
            min-height: 80px;
            background: #0a1628;
            border: 2px solid #37474f;
            border-radius: 10px;
            color: #e3f2fd;
            font-family: 'Roboto Mono', monospace;
            font-size: 0.78rem;
            padding: 10px;
            resize: vertical;
        }
        
        .copy-btn {
            margin-top: 6px;
            background: #263238;
            color: #b0bec5;
            font-size: 0.8rem;
            padding: 7px 12px;
            width: 100%;
        }
        
        .toggle-conn {
            font-size: 0.8rem;
            padding: 4px 12px;
            background: #263238;
            color: #90caf9;
            border: 1px solid #37474f;
            border-radius: 9999px;
            cursor: pointer;
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- Header -->
        <header>
            <div class="header-left">
                <div style="width: 42px; height: 42px; background: linear-gradient(135deg, #00d4ff, #00bcd4); border-radius: 10px; display: flex; align-items: center; justify-content: center; font-size: 1.5rem;">🖌️</div>
                <div>
                    <div class="title">Совместная Доска</div>
                    <div style="font-size: 0.8rem; color: #78909c;">WebRTC P2P • Неоновый Whiteboard</div>
                </div>
            </div>
            
            <div style="display: flex; align-items: center; gap: 12px;">
                <div id="connectionStatus" class="status">
                    <div class="status-dot"></div>
                    <span>Ожидание подключения...</span>
                </div>
                <button onclick="toggleConnectionPanel()" class="toggle-conn">Скрыть подключение</button>
            </div>
        </header>

        <div class="main">
            <!-- Left Toolbar -->
            <div class="toolbar">
                <div>
                    <h3>Цвет кисти</h3>
                    <div class="color-grid">
                        <div class="color-btn active" style="background:#00d4ff" data-color="#00d4ff"></div>
                        <div class="color-btn" style="background:#ff4081" data-color="#ff4081"></div>
                        <div class="color-btn" style="background:#69f0ae" data-color="#69f0ae"></div>
                        <div class="color-btn" style="background:#ffd54f" data-color="#ffd54f"></div>
                        <div class="color-btn" style="background:#b388ff" data-color="#b388ff"></div>
                        <div class="color-btn" style="background:#ff8a65" data-color="#ff8a65"></div>
                        <div class="color-btn" style="background:#ffffff" data-color="#ffffff"></div>
                        <div class="color-btn" style="background:#ff5252" data-color="#ff5252"></div>
                        <div class="color-btn" style="background:#00e676" data-color="#00e676"></div>
                        <div class="color-btn" style="background:#40c4ff" data-color="#40c4ff"></div>
                        <div class="color-btn" style="background:#ffeb3b" data-color="#ffeb3b"></div>
                        <div class="color-btn" style="background:#f06292" data-color="#f06292"></div>
                    </div>
                </div>

                <div>
                    <h3>Тип кисти</h3>
                    <div class="brush-types">
                        <div onclick="setBrushType('solid')" id="brush-solid" class="brush-btn active">Solid</div>
                        <div onclick="setBrushType('neon')" id="brush-neon" class="brush-btn">Neon</div>
                        <div onclick="setBrushType('dashed')" id="brush-dashed" class="brush-btn">Dashed</div>
                        <div onclick="setBrushType('eraser')" id="brush-eraser" class="brush-btn">Ластик</div>
                    </div>
                </div>

                <div>
                    <h3>Толщина</h3>
                    <input type="range" id="thicknessSlider" class="thickness-slider" min="2" max="40" step="1" value="8">
                    <div class="thickness-value" id="thicknessValue">8 px</div>
                </div>

                <div style="margin-top: auto;">
                    <button id="clearBtn" class="btn btn-danger">🗑️ Очистить всё</button>
                </div>
            </div>

            <!-- Canvas -->
            <div class="canvas-wrapper">
                <canvas id="whiteboard" width="1200" height="780"></canvas>
            </div>

            <!-- Right Chat -->
            <div class="chat-panel">
                <div class="chat-header">💬 Чат</div>
                <div id="chatLog"></div>
                <div class="chat-input">
                    <input type="text" id="chatInput" placeholder="Сообщение..." maxlength="140">
                    <button onclick="sendChatMessage()" style="padding: 0 14px; border-radius: 9999px; background: #00bcd4; color: white; border: none; font-weight: 600;">→</button>
                </div>
            </div>
        </div>

        <!-- Connection Panel (collapsible) -->
        <div id="connectionPanel" class="connection-panel">
            <div class="steps">
                <div class="step">
                    <h4>① Игрок 1 — создаёт комнату</h4>
                    <button id="createOfferBtn">Создать комнату (Offer)</button>
                    <textarea id="offerTextarea" readonly placeholder="Offer-код..."></textarea>
                    <button id="copyOfferBtn" class="copy-btn">📋 Скопировать</button>
                </div>
                
                <div class="step">
                    <h4>② Игрок 2 — присоединяется</h4>
                    <textarea id="offerInput" placeholder="Вставьте Offer от Игрока 1"></textarea>
                    <button id="acceptOfferBtn">Принять (Answer)</button>
                    <textarea id="answerTextarea" readonly placeholder="Answer-код..."></textarea>
                    <button id="copyAnswerBtn" class="copy-btn">📋 Скопировать</button>
                </div>
                
                <div class="step">
                    <h4>③ Игрок 1 — завершает</h4>
                    <textarea id="answerInput" placeholder="Вставьте Answer"></textarea>
                    <button id="connectBtn">🚀 Подключиться</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        // ==================== STATE ====================
        let pc = null;
        let dataChannel = null;
        let isHost = false;
        let iceCandidates = [];

        let currentColor = '#00d4ff';
        let currentThickness = 8;
        let currentBrush = 'solid'; // solid, neon, dashed, eraser
        let isDrawing = false;
        let lastX = 0, lastY = 0;

        const canvas = document.getElementById('whiteboard');
        const ctx = canvas.getContext('2d', { alpha: true });

        function updateConnectionStatus(text, connected = false) {
            const el = document.getElementById('connectionStatus');
            el.innerHTML = `<div class="status-dot"></div><span>${text}</span>`;
            if (connected) el.classList.add('connected');
            else el.classList.remove('connected');
        }

        function waitForIceGatheringComplete(peerConnection) {
            return new Promise(resolve => {
                if (peerConnection.iceGatheringState === 'complete') return resolve();
                const check = () => {
                    if (peerConnection.iceGatheringState === 'complete') {
                        peerConnection.removeEventListener('icegatheringstatechange', check);
                        resolve();
                    }
                };
                peerConnection.addEventListener('icegatheringstatechange', check);
                setTimeout(() => resolve(), 4000);
            });
        }

        function setupDataChannel(dc) {
            dc.onopen = () => {
                updateConnectionStatus('Соединено! Можно рисовать.', true);
                document.getElementById('createOfferBtn').disabled = true;
                document.getElementById('acceptOfferBtn').disabled = true;
                document.getElementById('connectBtn').disabled = true;
                appendChat('system', 'Соединение установлено. Рисуйте вместе!');
            };

            dc.onmessage = (event) => {
                try {
                    const msg = JSON.parse(event.data);
                    if (msg.type === 'draw') {
                        drawLineFromRemote(msg.x, msg.y, msg.color, msg.size, msg.brush, msg.isStart);
                    }
                    if (msg.type === 'CLEAR') {
                        clearCanvas();
                        appendChat('system', 'Доска очищена.');
                    }
                    if (msg.type === 'chat') {
                        appendChat('opponent', msg.text);
                    }
                } catch(e) {}
            };

            dc.onclose = () => updateConnectionStatus('Соединение закрыто', false);
        }

        async function generateOffer() {
            if (pc) pc.close();
            iceCandidates = [];
            isHost = true;
            pc = new RTCPeerConnection({ iceServers: [{ urls: 'stun:stun.l.google.com:19302' }] });
            dataChannel = pc.createDataChannel('whiteboard');
            setupDataChannel(dataChannel);
            pc.onicecandidate = e => { if (e.candidate) iceCandidates.push(e.candidate.toJSON()); };

            const offer = await pc.createOffer();
            await pc.setLocalDescription(offer);
            await waitForIceGatheringComplete(pc);

            const signal = { type: 'offer', sdp: pc.localDescription.sdp, iceCandidates };
            document.getElementById('offerTextarea').value = JSON.stringify(signal, null, 2);
            updateConnectionStatus('Offer создан — отправьте второму игроку');
        }

        async function acceptOffer() {
            const txt = document.getElementById('offerInput').value.trim();
            if (!txt) return;
            const sig = JSON.parse(txt);
            if (pc) pc.close();
            iceCandidates = [];
            isHost = false;

            pc = new RTCPeerConnection({ iceServers: [{ urls: 'stun:stun.l.google.com:19302' }] });
            pc.ondatachannel = e => { dataChannel = e.channel; setupDataChannel(dataChannel); };
            pc.onicecandidate = e => { if (e.candidate) iceCandidates.push(e.candidate.toJSON()); };

            await pc.setRemoteDescription(new RTCSessionDescription({ type: 'offer', sdp: sig.sdp }));
            for (let c of sig.iceCandidates || []) { try { await pc.addIceCandidate(new RTCIceCandidate(c)); } catch(e){} }

            const answer = await pc.createAnswer();
            await pc.setLocalDescription(answer);
            await waitForIceGatheringComplete(pc);

            const ansSig = { type: 'answer', sdp: pc.localDescription.sdp, iceCandidates };
            document.getElementById('answerTextarea').value = JSON.stringify(ansSig, null, 2);
            updateConnectionStatus('Answer создан — отправьте первому игроку');
        }

        async function connectWithAnswer() {
            const txt = document.getElementById('answerInput').value.trim();
            if (!txt || !pc) return;
            const sig = JSON.parse(txt);
            await pc.setRemoteDescription(new RTCSessionDescription({ type: 'answer', sdp: sig.sdp }));
            for (let c of sig.iceCandidates || []) { try { await pc.addIceCandidate(new RTCIceCandidate(c)); } catch(e){} }
            updateConnectionStatus('Соединение устанавливается...');
        }

        // ==================== DRAWING ====================
        function clearCanvas() {
            ctx.fillStyle = '#0d1b2a';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            // redraw subtle grid
            drawGrid();
        }

        function drawGrid() {
            ctx.strokeStyle = 'rgba(0, 212, 255, 0.06)';
            ctx.lineWidth = 1;
            for (let x = 0; x < canvas.width; x += 50) {
                ctx.beginPath(); ctx.moveTo(x, 0); ctx.lineTo(x, canvas.height); ctx.stroke();
            }
            for (let y = 0; y < canvas.height; y += 50) {
                ctx.beginPath(); ctx.moveTo(0, y); ctx.lineTo(canvas.width, y); ctx.stroke();
            }
        }

        function setBrushStyle(brush) {
            ctx.shadowBlur = 0;
            ctx.shadowColor = 'transparent';
            ctx.setLineDash([]);
            ctx.lineCap = 'round';
            ctx.lineJoin = 'round';

            if (brush === 'neon') {
                ctx.shadowBlur = 18;
                ctx.shadowColor = currentColor;
            } else if (brush === 'dashed') {
                ctx.setLineDash([12, 8]);
            } else if (brush === 'eraser') {
                ctx.strokeStyle = '#0d1b2a';
                ctx.lineWidth = currentThickness * 1.8;
            }
        }

        function drawLine(x1, y1, x2, y2, color, size, brush) {
            setBrushStyle(brush);
            
            if (brush !== 'eraser') {
                ctx.strokeStyle = color;
                ctx.lineWidth = size;
            }

            ctx.beginPath();
            ctx.moveTo(x1, y1);
            ctx.lineTo(x2, y2);
            ctx.stroke();

            // reset shadow after neon
            if (brush === 'neon') {
                ctx.shadowBlur = 0;
            }
        }

        function drawLineFromRemote(x, y, color, size, brush, isStart) {
            if (isStart) {
                lastX = x; lastY = y;
            } else {
                drawLine(lastX, lastY, x, y, color, size, brush);
                lastX = x; lastY = y;
            }
        }

        function getMousePos(e) {
            const rect = canvas.getBoundingClientRect();
            return { x: e.clientX - rect.left, y: e.clientY - rect.top };
        }

        function startDrawing(e) {
            isDrawing = true;
            const pos = getMousePos(e);
            lastX = pos.x; lastY = pos.y;

            if (dataChannel && dataChannel.readyState === 'open') {
                dataChannel.send(JSON.stringify({
                    type: 'draw',
                    x: pos.x, y: pos.y,
                    color: currentColor,
                    size: currentThickness,
                    brush: currentBrush,
                    isStart: true
                }));
            }
        }

        function draw(e) {
            if (!isDrawing) return;
            const pos = getMousePos(e);

            drawLine(lastX, lastY, pos.x, pos.y, currentColor, currentThickness, currentBrush);

            if (dataChannel && dataChannel.readyState === 'open') {
                dataChannel.send(JSON.stringify({
                    type: 'draw',
                    x: pos.x, y: pos.y,
                    color: currentColor,
                    size: currentThickness,
                    brush: currentBrush,
                    isStart: false
                }));
            }
            lastX = pos.x; lastY = pos.y;
        }

        function stopDrawing() { isDrawing = false; }

        function setBrushType(type) {
            currentBrush = type;
            document.querySelectorAll('.brush-btn').forEach(b => b.classList.remove('active'));
            document.getElementById('brush-' + type).classList.add('active');

            if (type === 'eraser') {
                document.getElementById('thicknessValue').textContent = Math.round(currentThickness * 1.8) + ' px (ластик)';
            } else {
                document.getElementById('thicknessValue').textContent = currentThickness + ' px';
            }
        }

        // ==================== CHAT ====================
        function appendChat(type, text) {
            const log = document.getElementById('chatLog');
            const div = document.createElement('div');

            if (type === 'system') {
                div.className = 'system';
                div.innerHTML = `⚓ ${text}`;
            } else if (type === 'me') {
                div.className = 'me';
                div.innerHTML = `<strong>Вы:</strong> ${text}`;
            } else {
                div.className = 'opponent';
                div.innerHTML = `<strong>Собеседник:</strong> ${text}`;
            }
            log.appendChild(div);
            log.scrollTop = log.scrollHeight;
        }

        function sendChatMessage() {
            const input = document.getElementById('chatInput');
            const text = input.value.trim();
            if (!text || !dataChannel || dataChannel.readyState !== 'open') return;

            dataChannel.send(JSON.stringify({ type: 'chat', text }));
            appendChat('me', text);
            input.value = '';
        }

        // ==================== INIT ====================
        function initCanvas() {
            ctx.fillStyle = '#0d1b2a';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            drawGrid();

            canvas.addEventListener('mousedown', startDrawing);
            canvas.addEventListener('mousemove', draw);
            canvas.addEventListener('mouseup', stopDrawing);
            canvas.addEventListener('mouseout', stopDrawing);

            // Touch
            canvas.addEventListener('touchstart', e => {
                e.preventDefault();
                const t = e.touches[0];
                startDrawing({ clientX: t.clientX, clientY: t.clientY });
            });
            canvas.addEventListener('touchmove', e => {
                e.preventDefault();
                const t = e.touches[0];
                draw({ clientX: t.clientX, clientY: t.clientY });
            });
            canvas.addEventListener('touchend', stopDrawing);
        }

        function init() {
            initCanvas();

            // Colors
            document.querySelectorAll('.color-btn').forEach(btn => {
                btn.addEventListener('click', () => {
                    document.querySelectorAll('.color-btn').forEach(b => b.classList.remove('active'));
                    btn.classList.add('active');
                    currentColor = btn.dataset.color;

                    if (currentBrush === 'neon') {
                        ctx.shadowColor = currentColor;
                    }
                });
            });

            // Thickness
            const slider = document.getElementById('thicknessSlider');
            const val = document.getElementById('thicknessValue');
            slider.addEventListener('input', () => {
                currentThickness = parseInt(slider.value);
                if (currentBrush === 'eraser') {
                    val.textContent = Math.round(currentThickness * 1.8) + ' px (ластик)';
                } else {
                    val.textContent = currentThickness + ' px';
                }
            });

            // Clear
            document.getElementById('clearBtn').addEventListener('click', () => {
                clearCanvas();
                if (dataChannel && dataChannel.readyState === 'open') {
                    dataChannel.send(JSON.stringify({ type: 'CLEAR' }));
                }
            });

            // WebRTC
            document.getElementById('createOfferBtn').addEventListener('click', generateOffer);
            document.getElementById('acceptOfferBtn').addEventListener('click', acceptOffer);
            document.getElementById('connectBtn').addEventListener('click', connectWithAnswer);

            document.getElementById('copyOfferBtn').addEventListener('click', () => {
                const ta = document.getElementById('offerTextarea');
                if (ta.value) navigator.clipboard.writeText(ta.value);
            });
            document.getElementById('copyAnswerBtn').addEventListener('click', () => {
                const ta = document.getElementById('answerTextarea');
                if (ta.value) navigator.clipboard.writeText(ta.value);
            });

            // Chat enter
            document.getElementById('chatInput').addEventListener('keypress', e => {
                if (e.key === 'Enter') sendChatMessage();
            });

            updateConnectionStatus('Ожидание действий. Создайте комнату или присоединитесь.');
            appendChat('system', 'Добро пожаловать! Обменяйтесь кодами для начала.');

            // Default brush
            setBrushType('solid');
        }

        function toggleConnectionPanel() {
            const panel = document.getElementById('connectionPanel');
            const btns = document.querySelectorAll('.toggle-conn');
            
            if (panel.style.display === 'none') {
                panel.style.display = 'block';
                btns.forEach(b => b.textContent = 'Скрыть подключение');
            } else {
                panel.style.display = 'none';
                btns.forEach(b => b.textContent = 'Показать подключение');
            }
        }

        window.onload = init;
    </script>
</body>
</html>
