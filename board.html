<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Совместная Доска • WebRTC</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Roboto+Mono:wght@400;500&display=swap');
        
        :root {
            --bg: #0a1628;
            --card: #132238;
            --accent: #00d4ff;
        }
        
        * { box-sizing: border-box; margin: 0; padding: 0; }
        
        body {
            background: linear-gradient(135deg, #0a1628 0%, #0d1b2a 100%);
            color: #e3f2fd;
            font-family: 'Inter', system_ui, sans-serif;
            min-height: 100vh;
            overflow: hidden;
        }
        
        .container {
            display: flex;
            flex-direction: column;
            height: 100vh;
        }
        
        header {
            padding: 16px 24px;
            background: #132238;
            border-bottom: 1px solid rgba(0, 212, 255, 0.1);
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-shrink: 0;
        }
        
        .header-left {
            display: flex;
            align-items: center;
            gap: 16px;
        }
        
        .title {
            font-size: 1.6rem;
            font-weight: 700;
            background: linear-gradient(90deg, #00d4ff, #00bcd4);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        
        .status {
            padding: 8px 16px;
            background: #0f1c2e;
            border-radius: 9999px;
            font-size: 0.9rem;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        
        .status-dot {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            background: #ff9800;
        }
        
        .status.connected .status-dot {
            background: #4caf50;
            box-shadow: 0 0 8px #4caf50;
        }
        
        .main {
            flex: 1;
            display: flex;
            overflow: hidden;
        }
        
        .toolbar {
            width: 220px;
            background: #132238;
            border-right: 1px solid rgba(0, 212, 255, 0.1);
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 20px;
            flex-shrink: 0;
        }
        
        .toolbar h3 {
            font-size: 0.95rem;
            color: #90caf9;
            margin-bottom: 8px;
        }
        
        .color-grid {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 10px;
        }
        
        .color-btn {
            width: 42px;
            height: 42px;
            border-radius: 10px;
            border: 3px solid #37474f;
            cursor: pointer;
            transition: transform 0.2s, border-color 0.2s;
        }
        
        .color-btn.active {
            border-color: white;
            box-shadow: 0 0 0 3px rgba(255,255,255,0.3);
            transform: scale(1.1);
        }
        
        .thickness-slider {
            width: 100%;
        }
        
        .thickness-value {
            text-align: center;
            font-size: 0.9rem;
            color: #90caf9;
            margin-top: 4px;
        }
        
        .btn {
            background: linear-gradient(135deg, #00bcd4, #0097a7);
            color: white;
            border: none;
            padding: 12px 20px;
            font-size: 0.95rem;
            font-weight: 600;
            border-radius: 10px;
            cursor: pointer;
            transition: all 0.2s;
            width: 100%;
        }
        
        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(0, 188, 212, 0.4);
        }
        
        .btn-danger {
            background: linear-gradient(135deg, #c62828, #b71c1c);
        }
        
        .canvas-container {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            background: #0a1628;
            position: relative;
        }
        
        #whiteboard {
            border: 4px solid #00d4ff;
            border-radius: 16px;
            box-shadow: 0 0 40px rgba(0, 212, 255, 0.2),
                        inset 0 0 60px rgba(0,0,0,0.6);
            background: #0d1b2a;
            cursor: crosshair;
        }
        
        .connection-panel {
            padding: 20px;
            background: #132238;
            border-top: 1px solid rgba(0, 212, 255, 0.1);
        }
        
        .steps {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 16px;
        }
        
        .step {
            background: #0f1c2e;
            border-radius: 12px;
            padding: 16px;
        }
        
        .step h4 {
            font-size: 0.9rem;
            color: #90caf9;
            margin-bottom: 10px;
        }
        
        textarea {
            width: 100%;
            min-height: 90px;
            background: #0a1628;
            border: 2px solid #37474f;
            border-radius: 10px;
            color: #e3f2fd;
            font-family: 'Roboto Mono', monospace;
            font-size: 0.8rem;
            padding: 12px;
            resize: vertical;
        }
        
        button.copy-btn {
            margin-top: 8px;
            background: #263238;
            color: #b0bec5;
            font-size: 0.85rem;
            padding: 8px 14px;
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- Header -->
        <header>
            <div class="header-left">
                <div style="width: 44px; height: 44px; background: linear-gradient(135deg, #00d4ff, #00bcd4); border-radius: 12px; display: flex; align-items: center; justify-content: center; font-size: 1.6rem;">🖌️</div>
                <div>
                    <div class="title">Совместная Доска</div>
                    <div style="font-size: 0.85rem; color: #78909c;">WebRTC P2P • Неоновый Whiteboard</div>
                </div>
            </div>
            
            <div id="connectionStatus" class="status">
                <div class="status-dot"></div>
                <span>Ожидание подключения...</span>
            </div>
        </header>

        <div class="main">
            <!-- Toolbar -->
            <div class="toolbar">
                <div>
                    <h3>Цвет кисти</h3>
                    <div class="color-grid">
                        <div class="color-btn active" style="background: #00d4ff;" data-color="#00d4ff"></div>
                        <div class="color-btn" style="background: #ff4081;" data-color="#ff4081"></div>
                        <div class="color-btn" style="background: #69f0ae;" data-color="#69f0ae"></div>
                        <div class="color-btn" style="background: #ffd54f;" data-color="#ffd54f"></div>
                        <div class="color-btn" style="background: #b388ff;" data-color="#b388ff"></div>
                        <div class="color-btn" style="background: #ff8a65;" data-color="#ff8a65"></div>
                        <div class="color-btn" style="background: #ffffff;" data-color="#ffffff"></div>
                        <div class="color-btn" style="background: #ff5252;" data-color="#ff5252"></div>
                    </div>
                </div>

                <div>
                    <h3>Толщина кисти</h3>
                    <input type="range" id="thicknessSlider" class="thickness-slider" min="2" max="30" step="1" value="6">
                    <div class="thickness-value" id="thicknessValue">6 px</div>
                </div>

                <div style="margin-top: auto;">
                    <button id="clearBtn" class="btn btn-danger">🗑️ Очистить всё</button>
                </div>

                <div style="font-size: 0.75rem; color: #546e7a; text-align: center; margin-top: 20px;">
                    Рисуй мышью.<br>
                    Всё синхронизируется в реальном времени.
                </div>
            </div>

            <!-- Canvas Area -->
            <div class="canvas-container">
                <canvas id="whiteboard" width="1100" height="700"></canvas>
            </div>
        </div>

        <!-- Connection Panel -->
        <div class="connection-panel">
            <div class="steps">
                <div class="step">
                    <h4>① Игрок 1 — создаёт комнату</h4>
                    <button id="createOfferBtn">Создать игру (Генерировать Offer)</button>
                    <textarea id="offerTextarea" readonly placeholder="Offer-код появится здесь..."></textarea>
                    <button id="copyOfferBtn" class="copy-btn">📋 Скопировать Offer</button>
                </div>
                
                <div class="step">
                    <h4>② Игрок 2 — присоединяется</h4>
                    <textarea id="offerInput" placeholder="Вставьте Offer-код от Игрока 1"></textarea>
                    <button id="acceptOfferBtn">Принять игру (Генерировать Answer)</button>
                    <textarea id="answerTextarea" readonly placeholder="Answer-код появится здесь..."></textarea>
                    <button id="copyAnswerBtn" class="copy-btn">📋 Скопировать Answer</button>
                </div>
                
                <div class="step">
                    <h4>③ Игрок 1 — завершает подключение</h4>
                    <textarea id="answerInput" placeholder="Вставьте Answer-код от Игрока 2"></textarea>
                    <button id="connectBtn">🚀 Начать соединение</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        // ==================== WEBRTC ====================
        let pc = null;
        let dataChannel = null;
        let isHost = false;
        let iceCandidates = [];

        let currentColor = '#00d4ff';
        let currentThickness = 6;
        let isDrawing = false;
        let lastX = 0;
        let lastY = 0;

        const canvas = document.getElementById('whiteboard');
        const ctx = canvas.getContext('2d', { alpha: true });

        function updateConnectionStatus(text, connected = false) {
            const statusEl = document.getElementById('connectionStatus');
            statusEl.innerHTML = `
                <div class="status-dot"></div>
                <span>${text}</span>
            `;
            if (connected) statusEl.classList.add('connected');
            else statusEl.classList.remove('connected');
        }

        function waitForIceGatheringComplete(peerConnection) {
            return new Promise((resolve) => {
                if (peerConnection.iceGatheringState === 'complete') {
                    resolve();
                    return;
                }
                const check = () => {
                    if (peerConnection.iceGatheringState === 'complete') {
                        peerConnection.removeEventListener('icegatheringstatechange', check);
                        resolve();
                    }
                };
                peerConnection.addEventListener('icegatheringstatechange', check);
                setTimeout(() => {
                    peerConnection.removeEventListener('icegatheringstatechange', check);
                    resolve();
                }, 4000);
            });
        }

        function setupDataChannel(dc) {
            dc.onopen = () => {
                updateConnectionStatus('Соединено! Рисуйте вместе.', true);
                document.getElementById('createOfferBtn').disabled = true;
                document.getElementById('acceptOfferBtn').disabled = true;
                document.getElementById('connectBtn').disabled = true;
            };

            dc.onmessage = (event) => {
                try {
                    const msg = JSON.parse(event.data);
                    if (msg.type === 'draw') {
                        drawLineFromRemote(msg.x, msg.y, msg.color, msg.size, msg.isStart);
                    }
                    if (msg.type === 'CLEAR') {
                        clearCanvas();
                    }
                } catch (e) {}
            };

            dc.onclose = () => {
                updateConnectionStatus('Соединение закрыто', false);
            };
        }

        async function generateOffer() {
            if (pc) pc.close();
            iceCandidates = [];
            isHost = true;

            pc = new RTCPeerConnection({ iceServers: [{ urls: 'stun:stun.l.google.com:19302' }] });
            dataChannel = pc.createDataChannel('whiteboard');
            setupDataChannel(dataChannel);

            pc.onicecandidate = e => { if (e.candidate) iceCandidates.push(e.candidate.toJSON()); };

            const offer = await pc.createOffer();
            await pc.setLocalDescription(offer);
            await waitForIceGatheringComplete(pc);

            const signal = { type: 'offer', sdp: pc.localDescription.sdp, iceCandidates };
            document.getElementById('offerTextarea').value = JSON.stringify(signal, null, 2);
            updateConnectionStatus('Offer создан — отправьте Игроку 2');
        }

        async function acceptOffer() {
            const txt = document.getElementById('offerInput').value.trim();
            if (!txt) return;

            const sig = JSON.parse(txt);
            if (pc) pc.close();
            iceCandidates = [];
            isHost = false;

            pc = new RTCPeerConnection({ iceServers: [{ urls: 'stun:stun.l.google.com:19302' }] });
            pc.ondatachannel = e => { dataChannel = e.channel; setupDataChannel(dataChannel); };
            pc.onicecandidate = e => { if (e.candidate) iceCandidates.push(e.candidate.toJSON()); };

            await pc.setRemoteDescription(new RTCSessionDescription({ type: 'offer', sdp: sig.sdp }));
            for (let c of sig.iceCandidates || []) { try { await pc.addIceCandidate(new RTCIceCandidate(c)); } catch(e){} }

            const answer = await pc.createAnswer();
            await pc.setLocalDescription(answer);
            await waitForIceGatheringComplete(pc);

            const ansSig = { type: 'answer', sdp: pc.localDescription.sdp, iceCandidates };
            document.getElementById('answerTextarea').value = JSON.stringify(ansSig, null, 2);
            updateConnectionStatus('Answer создан — отправьте Игроку 1');
        }

        async function connectWithAnswer() {
            const txt = document.getElementById('answerInput').value.trim();
            if (!txt || !pc) return;

            const sig = JSON.parse(txt);
            await pc.setRemoteDescription(new RTCSessionDescription({ type: 'answer', sdp: sig.sdp }));
            for (let c of sig.iceCandidates || []) { try { await pc.addIceCandidate(new RTCIceCandidate(c)); } catch(e){} }
            updateConnectionStatus('Соединение устанавливается...');
        }

        // ==================== DRAWING ====================
        function clearCanvas() {
            ctx.fillStyle = '#0d1b2a';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
        }

        function drawLine(x1, y1, x2, y2, color, size) {
            ctx.strokeStyle = color;
            ctx.lineWidth = size;
            ctx.lineCap = 'round';
            ctx.lineJoin = 'round';

            ctx.beginPath();
            ctx.moveTo(x1, y1);
            ctx.lineTo(x2, y2);
            ctx.stroke();
        }

        function drawLineFromRemote(x, y, color, size, isStart) {
            if (isStart) {
                lastX = x;
                lastY = y;
            } else {
                drawLine(lastX, lastY, x, y, color, size);
                lastX = x;
                lastY = y;
            }
        }

        function getMousePos(e) {
            const rect = canvas.getBoundingClientRect();
            return {
                x: e.clientX - rect.left,
                y: e.clientY - rect.top
            };
        }

        function startDrawing(e) {
            isDrawing = true;
            const pos = getMousePos(e);
            lastX = pos.x;
            lastY = pos.y;

            if (dataChannel && dataChannel.readyState === 'open') {
                dataChannel.send(JSON.stringify({
                    type: 'draw',
                    x: pos.x,
                    y: pos.y,
                    color: currentColor,
                    size: currentThickness,
                    isStart: true
                }));
            }
        }

        function draw(e) {
            if (!isDrawing) return;

            const pos = getMousePos(e);

            // Local draw
            drawLine(lastX, lastY, pos.x, pos.y, currentColor, currentThickness);

            // Send to peer
            if (dataChannel && dataChannel.readyState === 'open') {
                dataChannel.send(JSON.stringify({
                    type: 'draw',
                    x: pos.x,
                    y: pos.y,
                    color: currentColor,
                    size: currentThickness,
                    isStart: false
                }));
            }

            lastX = pos.x;
            lastY = pos.y;
        }

        function stopDrawing() {
            isDrawing = false;
        }

        // ==================== INIT ====================
        function initCanvas() {
            // Dark neon background
            ctx.fillStyle = '#0d1b2a';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            // Subtle grid
            ctx.strokeStyle = 'rgba(0, 212, 255, 0.08)';
            ctx.lineWidth = 1;
            for (let x = 0; x < canvas.width; x += 40) {
                ctx.beginPath();
                ctx.moveTo(x, 0);
                ctx.lineTo(x, canvas.height);
                ctx.stroke();
            }
            for (let y = 0; y < canvas.height; y += 40) {
                ctx.beginPath();
                ctx.moveTo(0, y);
                ctx.lineTo(canvas.width, y);
                ctx.stroke();
            }

            // Mouse events
            canvas.addEventListener('mousedown', startDrawing);
            canvas.addEventListener('mousemove', draw);
            canvas.addEventListener('mouseup', stopDrawing);
            canvas.addEventListener('mouseout', stopDrawing);

            // Touch support
            canvas.addEventListener('touchstart', (e) => {
                e.preventDefault();
                const touch = e.touches[0];
                const mouseEvent = new MouseEvent('mousedown', { clientX: touch.clientX, clientY: touch.clientY });
                canvas.dispatchEvent(mouseEvent);
            });
            canvas.addEventListener('touchmove', (e) => {
                e.preventDefault();
                const touch = e.touches[0];
                const mouseEvent = new MouseEvent('mousemove', { clientX: touch.clientX, clientY: touch.clientY });
                canvas.dispatchEvent(mouseEvent);
            });
            canvas.addEventListener('touchend', stopDrawing);
        }

        function init() {
            initCanvas();

            // Color buttons
            document.querySelectorAll('.color-btn').forEach(btn => {
                btn.addEventListener('click', () => {
                    document.querySelectorAll('.color-btn').forEach(b => b.classList.remove('active'));
                    btn.classList.add('active');
                    currentColor = btn.dataset.color;
                });
            });

            // Thickness
            const slider = document.getElementById('thicknessSlider');
            const valueEl = document.getElementById('thicknessValue');

            slider.addEventListener('input', () => {
                currentThickness = parseInt(slider.value);
                valueEl.textContent = currentThickness + ' px';
            });

            // Clear button
            document.getElementById('clearBtn').addEventListener('click', () => {
                clearCanvas();
                if (dataChannel && dataChannel.readyState === 'open') {
                    dataChannel.send(JSON.stringify({ type: 'CLEAR' }));
                }
            });

            // WebRTC buttons
            document.getElementById('createOfferBtn').addEventListener('click', generateOffer);
            document.getElementById('acceptOfferBtn').addEventListener('click', acceptOffer);
            document.getElementById('connectBtn').addEventListener('click', connectWithAnswer);

            // Copy buttons
            document.getElementById('copyOfferBtn').addEventListener('click', () => {
                const ta = document.getElementById('offerTextarea');
                if (ta.value) navigator.clipboard.writeText(ta.value);
            });
            document.getElementById('copyAnswerBtn').addEventListener('click', () => {
                const ta = document.getElementById('answerTextarea');
                if (ta.value) navigator.clipboard.writeText(ta.value);
            });

            updateConnectionStatus('Ожидание действий. Создайте комнату или присоединитесь.');

            console.log('%c[Whiteboard] Готов к работе', 'color:#00d4ff');
        }

        window.onload = init;
    </script>
</body>
</html>
