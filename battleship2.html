<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Морской бой: ПРО • Advanced</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Space+Grotesk:wght@500;600&display=swap');
        body { font-family: 'Inter', system-ui, sans-serif; }
        .title-font { font-family: 'Space Grotesk', system-ui, sans-serif; }
        canvas { image-rendering: crisp-edges; border: 2px solid #334155; border-radius: 8px; }
        .neon-cyan { text-shadow: 0 0 10px #67e8f9; }
        .log-entry { font-size: 0.85rem; }
    </style>
</head>
<body class="bg-slate-950 text-slate-200">
    <div class="max-w-[1400px] mx-auto p-6">
        <div class="flex items-center justify-between mb-6">
            <div class="flex items-center gap-x-4">
                <div class="w-14 h-14 bg-gradient-to-br from-cyan-500 to-blue-600 rounded-2xl flex items-center justify-center">
                    <span class="text-white text-4xl">⚓</span>
                </div>
                <div>
                    <h1 class="text-5xl font-bold tracking-tighter title-font neon-cyan">Морской бой: ПРО</h1>
                    <p class="text-slate-400">Advanced • 50×50 • Энергия • Супер-удары</p>
                </div>
            </div>
            <div id="connStatus" class="px-5 py-2 bg-slate-900 border border-slate-700 rounded-3xl text-sm flex items-center gap-x-3">
                <div class="w-2.5 h-2.5 bg-amber-400 rounded-full animate-pulse"></div>
                <span>Ожидание подключения...</span>
            </div>
        </div>

        <!-- Signaling -->
        <div id="signalingPanel" class="bg-slate-900 border border-slate-700 rounded-3xl p-6 mb-6">
            <div class="grid grid-cols-1 md:grid-cols-3 gap-4">
                <div>
                    <button onclick="generateOffer()" class="w-full bg-cyan-600 hover:bg-cyan-500 py-3 rounded-2xl font-semibold">Создать игру (Offer)</button>
                    <textarea id="offerOut" readonly class="mt-2 w-full h-16 bg-slate-950 border border-slate-700 rounded-xl p-2 text-xs font-mono"></textarea>
                    <button onclick="copyText('offerOut')" class="mt-1 w-full text-xs py-1.5 bg-slate-800 rounded-2xl">Скопировать</button>
                </div>
                <div>
                    <textarea id="offerIn" placeholder="Вставьте Offer" class="w-full h-16 bg-slate-950 border border-slate-700 rounded-xl p-2 text-xs font-mono"></textarea>
                    <button onclick="acceptOffer()" class="mt-2 w-full bg-teal-600 hover:bg-teal-500 py-3 rounded-2xl font-semibold">Принять игру (Answer)</button>
                    <textarea id="answerOut" readonly class="mt-2 w-full h-16 bg-slate-950 border border-slate-700 rounded-xl p-2 text-xs font-mono"></textarea>
                    <button onclick="copyText('answerOut')" class="mt-1 w-full text-xs py-1.5 bg-slate-800 rounded-2xl">Скопировать</button>
                </div>
                <div>
                    <textarea id="answerIn" placeholder="Вставьте Answer" class="w-full h-16 bg-slate-950 border border-slate-700 rounded-xl p-2 text-xs font-mono"></textarea>
                    <button onclick="connectAnswer()" class="mt-2 w-full bg-sky-600 hover:bg-sky-500 py-3 rounded-2xl font-semibold">Завершить подключение</button>
                </div>
            </div>
        </div>

        <div class="grid grid-cols-1 lg:grid-cols-12 gap-6">
            <div class="lg:col-span-5">
                <div class="flex items-center justify-between mb-2 px-1">
                    <div class="text-cyan-400 font-bold">МОЁ ПОЛЕ <span class="text-xs text-slate-500">(50×50)</span></div>
                    <div id="energyDisplay" class="px-4 py-1 bg-slate-900 border border-cyan-700 rounded-2xl text-sm font-mono">
                        Энергия: <span id="energy" class="font-bold text-cyan-400">100</span>
                    </div>
                </div>
                <canvas id="myCanvas" width="500" height="500" class="bg-[#0a0f1a] rounded-xl border border-slate-700"></canvas>
            </div>

            <div class="lg:col-span-5">
                <div class="flex items-center justify-between mb-2 px-1">
                    <div class="text-red-400 font-bold">ПОЛЕ ВРАГА</div>
                    <div class="text-xs text-slate-500">Клик = выстрел</div>
                </div>
                <canvas id="enemyCanvas" width="500" height="500" class="bg-[#0a0f1a] rounded-xl border border-slate-700 cursor-crosshair"></canvas>
            </div>

            <div class="lg:col-span-2 space-y-4">
                <div class="bg-slate-900 border border-slate-700 rounded-3xl p-4">
                    <div class="text-sm font-bold mb-3 text-amber-400">СПОСОБНОСТИ</div>
                    <div class="space-y-2">
                        <button onclick="useAbility('sonar')" class="w-full text-left px-4 py-2.5 bg-slate-800 hover:bg-slate-700 rounded-2xl text-sm flex justify-between">
                            <span>Сонар (30)</span>
                        </button>
                        <button onclick="useAbility('airstrike')" class="w-full text-left px-4 py-2.5 bg-slate-800 hover:bg-slate-700 rounded-2xl text-sm flex justify-between">
                            <span>Авиаудар (50)</span>
                        </button>
                        <button onclick="useAbility('nuke')" class="w-full text-left px-4 py-2.5 bg-slate-800 hover:bg-slate-700 rounded-2xl text-sm flex justify-between">
                            <span>Ядерный удар (100)</span>
                        </button>
                    </div>
                </div>

                <div class="bg-slate-900 border border-slate-700 rounded-3xl p-4 h-[280px] overflow-auto">
                    <div class="text-sm font-bold mb-2 text-emerald-400">ЛОГ БОЯ</div>
                    <div id="actionLog" class="text-xs space-y-1 text-slate-400 font-mono"></div>
                </div>

                <button onclick="restartGame()" class="w-full py-3 bg-white text-slate-950 hover:bg-gray-200 font-bold rounded-2xl hidden" id="restartBtn">
                    Играть снова
                </button>
            </div>
        </div>
    </div>

    <script>
        const GRID_SIZE = 50;
        const CELL_SIZE = 10;

        let myGrid = Array(GRID_SIZE).fill().map(() => Array(GRID_SIZE).fill(0));
        let enemyGrid = Array(GRID_SIZE).fill().map(() => Array(GRID_SIZE).fill(0));
        let myShips = [];
        let enemyShips = [];
        let energy = 100;
        let isHost = false;
        let gameStarted = false;
        let gameOver = false;
        let myTurn = true;

        let pc = null;
        let dataChannel = null;
        let iceCandidates = [];

        function updateStatus(text, connected = false) {
            const el = document.getElementById('connStatus');
            el.innerHTML = `<div class="w-2.5 h-2.5 ${connected ? 'bg-emerald-400' : 'bg-amber-400 animate-pulse'} rounded-full"></div><span>${text}</span>`;
        }

        function sendMessage(msg) {
            if (dataChannel && dataChannel.readyState === 'open') {
                dataChannel.send(JSON.stringify(msg));
            }
        }

        function handleMessage(msg) {
            if (msg.type === 'place') {
                enemyShips = msg.ships;
            }
            if (msg.type === 'shot') {
                const result = processShot(msg.x, msg.y, true);
                sendMessage({ type: 'shotResult', x: msg.x, y: msg.y, result });
                if (result.hit) { energy += 20; updateEnergy(); }
            }
            if (msg.type === 'shotResult') {
                applyShotResult(msg.x, msg.y, msg.result);
                myTurn = true;
            }
            if (msg.type === 'ability') {
                applyEnemyAbility(msg.ability, msg.data);
            }
            if (msg.type === 'RESTART_GAME') {
                restartGame(false);
            }
        }

        function canPlaceShip(x, y, size, horizontal, grid) {
            for (let i = 0; i < size; i++) {
                const nx = horizontal ? x + i : x;
                const ny = horizontal ? y : y + i;
                if (nx >= GRID_SIZE || ny >= GRID_SIZE || grid[ny][nx] !== 0) return false;
            }
            return true;
        }

        function placeShip(x, y, size, horizontal, grid, ships) {
            const ship = { x, y, size, horizontal, hits: 0 };
            for (let i = 0; i < size; i++) {
                const nx = horizontal ? x + i : x;
                const ny = horizontal ? y : y + i;
                grid[ny][nx] = 1;
            }
            ships.push(ship);
        }

        function autoPlaceFleet(grid, ships) {
            ships.length = 0;
            grid.forEach(row => row.fill(0));
            const configs = [
                {size:5, count:1}, {size:4, count:2}, {size:3, count:3}, {size:2, count:4},
                {size:6, count:1, special:'carrier'}, {size:3, count:2, special:'sub'}
            ];
            for (let cfg of configs) {
                for (let c = 0; c < cfg.count; c++) {
                    let placed = false, attempts = 0;
                    while (!placed && attempts < 300) {
                        attempts++;
                        const x = Math.floor(Math.random()*GRID_SIZE);
                        const y = Math.floor(Math.random()*GRID_SIZE);
                        const h = Math.random() > 0.5;
                        if (cfg.special === 'carrier') {
                            if (canPlaceShip(x,y,4,true,grid) && canPlaceShip(x+1,y-1,3,false,grid)) {
                                placeShip(x,y,4,true,grid,ships);
                                placeShip(x+1,y-1,3,false,grid,ships);
                                placed = true;
                            }
                        } else if (canPlaceShip(x,y,cfg.size,h,grid)) {
                            placeShip(x,y,cfg.size,h,grid,ships);
                            placed = true;
                        }
                    }
                }
            }
        }

        function drawGrid(canvas, grid, showShips = true) {
            const ctx = canvas.getContext('2d');
            ctx.fillStyle = '#0a0f1a';
            ctx.fillRect(0,0,canvas.width,canvas.height);
            const cell = CELL_SIZE;
            for (let y=0; y<GRID_SIZE; y++) {
                for (let x=0; x<GRID_SIZE; x++) {
                    const v = grid[y][x];
                    if (v===1 && showShips) ctx.fillStyle = '#22c55e';
                    else if (v===2) ctx.fillStyle = '#ef4444';
                    else if (v===3) ctx.fillStyle = '#64748b';
                    else continue;
                    ctx.fillRect(x*cell, y*cell, cell-1, cell-1);
                }
            }
            ctx.strokeStyle = '#334155';
            ctx.lineWidth = 0.5;
            for (let i=0; i<=GRID_SIZE; i++) {
                ctx.beginPath(); ctx.moveTo(i*cell,0); ctx.lineTo(i*cell,GRID_SIZE*cell); ctx.stroke();
                ctx.beginPath(); ctx.moveTo(0,i*cell); ctx.lineTo(GRID_SIZE*cell,i*cell); ctx.stroke();
            }
        }

        function updateEnergy() { document.getElementById('energy').textContent = energy; }

        function logAction(text) {
            const log = document.getElementById('actionLog');
            const div = document.createElement('div');
            div.className = 'log-entry text-emerald-400';
            div.textContent = '> ' + text;
            log.appendChild(div);
            log.scrollTop = log.scrollHeight;
        }

        function processShot(x, y) {
            if (myGrid[y][x] === 1) { myGrid[y][x] = 2; return {hit:true}; }
            if (myGrid[y][x] === 0) { myGrid[y][x] = 3; return {hit:false}; }
            return {hit:false};
        }

        function applyShotResult(x, y, result) {
            enemyGrid[y][x] = result.hit ? 2 : 3;
            drawGrid(document.getElementById('enemyCanvas'), enemyGrid, false);
            if (result.hit) { energy += 20; updateEnergy(); logAction('Попадание! +20 энергии'); }
        }

        function shoot(x, y) {
            if (!myTurn || gameOver) return;
            sendMessage({type:'shot', x, y});
            myTurn = false;
        }

        function useAbility(type) {
            if (!myTurn || gameOver) return;
            let cost = (type==='sonar'?30 : type==='airstrike'?50 : 100);
            if (energy < cost) { alert('Недостаточно энергии'); return; }
            energy -= cost; updateEnergy();
            const cx = Math.floor(Math.random()*(GRID_SIZE-6));
            const cy = Math.floor(Math.random()*(GRID_SIZE-6));
            sendMessage({type:'ability', ability:type, data:{cx,cy}});
            logAction('Вы применили ' + type);
            myTurn = false;
        }

        function applyEnemyAbility(ability) {
            logAction('Враг применил ' + ability);
        }

        function startGameAsHost() {
            autoPlaceFleet(myGrid, myShips);
            sendMessage({type:'place', ships:myShips});
            drawGrid(document.getElementById('myCanvas'), myGrid, true);
            gameStarted = true;
            myTurn = true;
            logAction('Игра началась');
        }

        function restartGame(sendSignal = true) {
            myGrid = Array(GRID_SIZE).fill().map(()=>Array(GRID_SIZE).fill(0));
            enemyGrid = Array(GRID_SIZE).fill().map(()=>Array(GRID_SIZE).fill(0));
            myShips = []; enemyShips = [];
            energy = 100; gameOver = false; gameStarted = false;
            updateEnergy();
            drawGrid(document.getElementById('myCanvas'), myGrid, true);
            drawGrid(document.getElementById('enemyCanvas'), enemyGrid, false);
            document.getElementById('restartBtn').classList.add('hidden');
            document.getElementById('actionLog').innerHTML = '';
            if (isHost) {
                autoPlaceFleet(myGrid, myShips);
                drawGrid(document.getElementById('myCanvas'), myGrid, true);
                if (sendSignal) sendMessage({type:'RESTART_GAME'});
                gameStarted = true; myTurn = true;
            }
        }

        function setupCanvasListeners() {
            const c = document.getElementById('enemyCanvas');
            c.addEventListener('click', e => {
                if (!gameStarted || !myTurn || gameOver) return;
                const r = c.getBoundingClientRect();
                const x = Math.floor((e.clientX - r.left) / CELL_SIZE);
                const y = Math.floor((e.clientY - r.top) / CELL_SIZE);
                if (x>=0 && x<GRID_SIZE && y>=0 && y<GRID_SIZE) shoot(x,y);
            });
        }

        // ==================== FIXED WEBRTC ====================
        function waitForIce(peerConnection) {
            return new Promise(resolve => {
                if (peerConnection.iceGatheringState === 'complete') return resolve();
                const listener = () => {
                    if (peerConnection.iceGatheringState === 'complete') {
                        peerConnection.removeEventListener('icegatheringstatechange', listener);
                        resolve();
                    }
                };
                peerConnection.addEventListener('icegatheringstatechange', listener);
                setTimeout(() => { peerConnection.removeEventListener('icegatheringstatechange', listener); resolve(); }, 4000);
            });
        }

        function setupDataChannel(dc) {
            dc.onopen = () => {
                updateStatus('Соединено!', true);
                document.getElementById('signalingPanel').style.display = 'none';
                if (isHost) startGameAsHost();
            };
            dc.onmessage = e => { try { handleMessage(JSON.parse(e.data)); } catch(e){} };
        }

        async function generateOffer() {
            if (pc) pc.close();
            iceCandidates = [];
            isHost = true;
            pc = new RTCPeerConnection({ iceServers: [{ urls: 'stun:stun.l.google.com:19302' }] });
            dataChannel = pc.createDataChannel('advanced-battleship');
            setupDataChannel(dataChannel);

            pc.onicecandidate = e => { if (e.candidate) iceCandidates.push(e.candidate.toJSON()); };

            const offer = await pc.createOffer();
            await pc.setLocalDescription(offer);
            await waitForIce(pc);

            const signal = { type: 'offer', sdp: pc.localDescription.sdp, iceCandidates };
            document.getElementById('offerOut').value = JSON.stringify(signal, null, 2);
            updateStatus('Offer создан — отправьте второму игроку');
        }

        async function acceptOffer() {
            const txt = document.getElementById('offerIn').value.trim();
            if (!txt) return alert('Вставьте Offer');
            const sig = JSON.parse(txt);
            if (pc) pc.close();
            iceCandidates = [];
            isHost = false;

            pc = new RTCPeerConnection({ iceServers: [{ urls: 'stun:stun.l.google.com:19302' }] });
            pc.ondatachannel = e => { dataChannel = e.channel; setupDataChannel(dataChannel); };
            pc.onicecandidate = e => { if (e.candidate) iceCandidates.push(e.candidate.toJSON()); };

            await pc.setRemoteDescription(new RTCSessionDescription({type:'offer', sdp: sig.sdp}));
            for (let c of sig.iceCandidates || []) { try { await pc.addIceCandidate(new RTCIceCandidate(c)); } catch(e){} }

            const answer = await pc.createAnswer();
            await pc.setLocalDescription(answer);
            await waitForIce(pc);

            const ansSig = { type: 'answer', sdp: pc.localDescription.sdp, iceCandidates };
            document.getElementById('answerOut').value = JSON.stringify(ansSig, null, 2);
            updateStatus('Answer создан — отправьте первому игроку');
        }

        async function connectAnswer() {
            const txt = document.getElementById('answerIn').value.trim();
            if (!txt || !pc) return alert('Сначала создайте Offer');
            const sig = JSON.parse(txt);
            await pc.setRemoteDescription(new RTCSessionDescription({type:'answer', sdp: sig.sdp}));
            for (let c of sig.iceCandidates || []) { try { await pc.addIceCandidate(new RTCIceCandidate(c)); } catch(e){} }
            updateStatus('Соединение установлено');
        }

        function copyText(id) {
            const ta = document.getElementById(id);
            if (ta.value) navigator.clipboard.writeText(ta.value);
        }

        function init() {
            drawGrid(document.getElementById('myCanvas'), myGrid, true);
            drawGrid(document.getElementById('enemyCanvas'), enemyGrid, false);
            updateEnergy();
            setupCanvasListeners();
            console.log('%c[PRO] Исправленная версия загружена', 'color:#67e8f9');
        }
        window.onload = init;
    </script>
</body>
</html>
