<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Морской бой: ПРО</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>body { font-family: 'Inter', system_ui, sans-serif; } canvas { border: 3px solid #334155; border-radius: 12px; }</style>
</head>
<body class="bg-slate-950 text-slate-200 p-6">
    <div class="max-w-[1300px] mx-auto">
        <div class="flex items-center justify-between mb-6">
            <div>
                <h1 class="text-5xl font-bold tracking-tighter text-cyan-400">Морской бой: ПРО</h1>
                <p class="text-slate-400">50×50 • Энергия • Супер-удары</p>
            </div>
            <div id="connStatus" class="px-5 py-2 bg-slate-900 border border-cyan-700 rounded-3xl text-sm">Подключено через хаб</div>
        </div>

        <div class="grid grid-cols-1 lg:grid-cols-12 gap-6">
            <div class="lg:col-span-5">
                <div class="text-cyan-400 font-bold mb-2">МОЁ ПОЛЕ</div>
                <canvas id="myCanvas" width="500" height="500" class="bg-[#0a0f1a] rounded-xl"></canvas>
            </div>
            <div class="lg:col-span-5">
                <div class="text-red-400 font-bold mb-2">ПОЛЕ ВРАГА</div>
                <canvas id="enemyCanvas" width="500" height="500" class="bg-[#0a0f1a] rounded-xl cursor-crosshair"></canvas>
            </div>
            <div class="lg:col-span-2">
                <div class="bg-slate-900 border border-slate-700 rounded-3xl p-4 mb-4">
                    <div class="text-amber-400 font-bold mb-3">СПОСОБНОСТИ</div>
                    <div class="space-y-2 text-sm">
                        <button onclick="useAbility('sonar')" class="w-full px-4 py-2 bg-slate-800 hover:bg-slate-700 rounded-2xl">Сонар (20)</button>
                        <button onclick="useAbility('airstrike')" class="w-full px-4 py-2 bg-slate-800 hover:bg-slate-700 rounded-2xl">Авиаудар (40)</button>
                        <button onclick="useAbility('nuke')" class="w-full px-4 py-2 bg-slate-800 hover:bg-slate-700 rounded-2xl">Ядерный удар (80)</button>
                    </div>
                </div>
                <button onclick="restartGame()" class="w-full py-3 bg-white text-slate-950 hover:bg-gray-200 font-bold rounded-2xl hidden" id="restartBtn">Играть снова</button>
            </div>
        </div>
    </div>

    <script>
        const GRID_SIZE = 50;
        const CELL_SIZE = 10;

        let myGrid = [];
        let enemyGrid = [];
        let energy = 100;
        let myTurn = true;
        let gameOver = false;

        function sendToHub(msg) {
            window.parent.postMessage(JSON.stringify(msg), '*');
        }

        window.addEventListener('message', (event) => {
            try {
                const msg = JSON.parse(event.data);
                if (msg.type === 'shot_result') {
                    // handle result
                }
                if (msg.type === 'connection_ready') {
                    document.getElementById('connStatus').innerHTML = 'Подключено. Игра началась.';
                }
            } catch(e) {}
        });

        function initGrids() {
            myGrid = Array(GRID_SIZE).fill().map(() => Array(GRID_SIZE).fill(0));
            enemyGrid = Array(GRID_SIZE).fill().map(() => Array(GRID_SIZE).fill(0));
        }

        function drawMyGrid() {
            const canvas = document.getElementById('myCanvas');
            const ctx = canvas.getContext('2d');
            ctx.fillStyle = '#0a0f1a';
            ctx.fillRect(0, 0, 500, 500);
            for (let y = 0; y < GRID_SIZE; y++) {
                for (let x = 0; x < GRID_SIZE; x++) {
                    if (myGrid[y][x] === 1) {
                        ctx.fillStyle = '#22c55e';
                        ctx.fillRect(x * CELL_SIZE, y * CELL_SIZE, CELL_SIZE - 1, CELL_SIZE - 1);
                    }
                }
            }
        }

        function drawEnemyGrid() {
            const canvas = document.getElementById('enemyCanvas');
            const ctx = canvas.getContext('2d');
            ctx.fillStyle = '#0a0f1a';
            ctx.fillRect(0, 0, 500, 500);
            for (let y = 0; y < GRID_SIZE; y++) {
                for (let x = 0; x < GRID_SIZE; x++) {
                    const val = enemyGrid[y][x];
                    if (val === 2) ctx.fillStyle = '#ef4444';
                    else if (val === 3) ctx.fillStyle = '#64748b';
                    else continue;
                    ctx.fillRect(x * CELL_SIZE, y * CELL_SIZE, CELL_SIZE - 1, CELL_SIZE - 1);
                }
            }
        }

        function useAbility(type) {
            if (!myTurn || gameOver) return;
            sendToHub({ type: 'ability', ability: type });
            myTurn = false;
        }

        function restartGame() {
            initGrids();
            energy = 100;
            gameOver = false;
            drawMyGrid();
            drawEnemyGrid();
            document.getElementById('restartBtn').classList.add('hidden');
            sendToHub({ type: 'RESTART_PRO' });
        }

        function init() {
            initGrids();
            drawMyGrid();
            drawEnemyGrid();

            const enemyCanvas = document.getElementById('enemyCanvas');
            enemyCanvas.addEventListener('click', (e) => {
                if (!myTurn || gameOver) return;
                const rect = enemyCanvas.getBoundingClientRect();
                const x = Math.floor((e.clientX - rect.left) / CELL_SIZE);
                const y = Math.floor((e.clientY - rect.top) / CELL_SIZE);
                sendToHub({ type: 'shot', x, y });
                myTurn = false;
            });

            setTimeout(() => {
                window.parent.postMessage(JSON.stringify({ type: 'game_loaded', game: 'battleship2' }), '*');
            }, 300);
        }

        window.onload = init;
    </script>
</body>
</html>
