<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Пинг-Понг</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>body { font-family: 'Inter', system_ui, sans-serif; } canvas { border: 4px solid #334155; border-radius: 12px; }</style>
</head>
<body class="bg-slate-950 text-slate-200 p-6">
    <div class="max-w-[900px] mx-auto text-center">
        <h1 class="text-4xl font-bold mb-2">Сетевой Пинг-Понг</h1>
        <p class="text-slate-400 mb-6">Внутри хаба • WebRTC</p>

        <canvas id="game" width="800" height="500" class="bg-black mx-auto rounded-xl"></canvas>

        <div class="mt-4 flex justify-center gap-8 text-2xl font-bold">
            <div>Игрок 1: <span id="score1">0</span></div>
            <div>Игрок 2: <span id="score2">0</span></div>
        </div>

        <div id="status" class="mt-3 text-lg text-emerald-400">Ожидание подключения через хаб...</div>
    </div>

    <script>
        const canvas = document.getElementById('game');
        const ctx = canvas.getContext('2d');

        let paddle1 = { y: 200 };
        let paddle2 = { y: 200 };
        let ball = { x: 400, y: 250, vx: 5, vy: 3 };
        let score1 = 0, score2 = 0;
        let isHost = false;

        function sendToHub(msg) {
            window.parent.postMessage(JSON.stringify(msg), '*');
        }

        window.addEventListener('message', (event) => {
            try {
                const msg = JSON.parse(event.data);
                if (msg.type === 'state') {
                    paddle2.y = msg.paddle2;
                    ball = msg.ball;
                    score1 = msg.score1;
                    score2 = msg.score2;
                }
                if (msg.type === 'connection_ready') {
                    document.getElementById('status').innerHTML = 'Подключено. Игра началась!';
                }
            } catch(e) {}
        });

        function draw() {
            ctx.fillStyle = '#111827';
            ctx.fillRect(0, 0, 800, 500);

            ctx.fillStyle = '#22c55e';
            ctx.fillRect(30, paddle1.y, 12, 80);

            ctx.fillStyle = '#3b82f6';
            ctx.fillRect(758, paddle2.y, 12, 80);

            ctx.fillStyle = '#f1f5f9';
            ctx.beginPath();
            ctx.arc(ball.x, ball.y, 8, 0, Math.PI * 2);
            ctx.fill();

            document.getElementById('score1').textContent = score1;
            document.getElementById('score2').textContent = score2;
        }

        function gameLoop() {
            if (isHost) {
                ball.x += ball.vx;
                ball.y += ball.vy;

                if (ball.y < 0 || ball.y > 500) ball.vy *= -1;

                if (ball.x < 50 && ball.y > paddle1.y && ball.y < paddle1.y + 80) ball.vx *= -1;
                if (ball.x > 750 && ball.y > paddle2.y && ball.y < paddle2.y + 80) ball.vx *= -1;

                if (ball.x < 0) { score2++; resetBall(); }
                if (ball.x > 800) { score1++; resetBall(); }

                sendToHub({ type: 'state', paddle2: paddle2.y, ball, score1, score2 });
            }
            draw();
            requestAnimationFrame(gameLoop);
        }

        function resetBall() {
            ball = { x: 400, y: 250, vx: (Math.random() > 0.5 ? 5 : -5), vy: (Math.random() - 0.5) * 6 };
        }

        function init() {
            canvas.addEventListener('mousemove', e => {
                if (isHost) {
                    paddle1.y = Math.max(0, Math.min(420, e.offsetY - 40));
                }
            });

            setTimeout(() => {
                window.parent.postMessage(JSON.stringify({ type: 'game_loaded', game: 'pingpong' }), '*');
            }, 200);

            gameLoop();
        }

        window.onload = init;
    </script>
</body>
</html>
