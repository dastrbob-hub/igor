<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Transfer • P2P Файлообменник</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/peerjs@1.5.4/dist/peerjs.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Space+Grotesk:wght@500;600&display=swap');
        body { font-family: 'Inter', system_ui, sans-serif; }
        .title-font { font-family: 'Space Grotesk', system_ui, sans-serif; }
        .file-card {
            transition: all 0.2s ease;
        }
        .progress-bar {
            transition: width 0.1s linear;
        }
    </style>
</head>
<body class="bg-slate-950 text-slate-200">
    <div class="max-w-3xl mx-auto px-6 py-8">
        <!-- Header -->
        <div class="flex items-center justify-between mb-8">
            <div>
                <h1 class="text-4xl font-bold tracking-tighter title-font">Transfer</h1>
                <p class="text-slate-400">Быстрый P2P файлообмен между устройствами</p>
            </div>
            <a href="index.html" class="text-sm px-4 py-2 rounded-2xl bg-slate-900 hover:bg-slate-800 transition-colors">
                ← В хаб
            </a>
        </div>

        <!-- Connection Screen -->
        <div id="connectScreen">
            <div class="bg-slate-900 border border-slate-800 rounded-3xl p-8 text-center">
                <h2 class="text-2xl font-semibold mb-2">Подключение</h2>
                <p class="text-slate-400 mb-6">Откройте эту страницу на втором устройстве или отсканируйте QR-код</p>

                <!-- QR Code Container -->
                <div id="qrcode-container" style="background: white; padding: 16px; display: none; border-radius: 12px; margin: 20px auto; text-align: center; min-width: 200px; min-height: 200px; box-shadow: 0 10px 15px -3px rgb(0 0 0 / 0.1);">
                    <img id="qr-image" src="" alt="QR Code" style="display: block; margin: 0 auto; border-radius: 4px;">
                </div>

                <!-- Host preparing -->
                <div id="host-preparing" class="mt-4">
                    <div class="inline-flex items-center gap-x-3 px-5 py-3 bg-slate-800 rounded-2xl">
                        <div class="w-2.5 h-2.5 bg-amber-400 rounded-full animate-pulse"></div>
                        <span class="text-sm font-medium text-amber-300">Подготовка комнаты...</span>
                    </div>
                </div>

                <!-- Guest connecting -->
                <div id="guest-connecting" class="hidden mt-4">
                    <div class="inline-flex items-center gap-x-3 px-5 py-3 bg-slate-800 rounded-2xl">
                        <div class="w-2.5 h-2.5 bg-cyan-400 rounded-full animate-pulse"></div>
                        <span id="guest-status-text" class="text-sm font-medium">Подключение к комнате...</span>
                    </div>
                </div>

                <div class="bg-slate-950 border border-slate-800 rounded-2xl p-4 mt-6 mb-4">
                    <div class="text-xs text-slate-500 mb-1">ID комнаты</div>
                    <div id="roomId" class="font-mono text-lg text-cyan-400 break-all"></div>
                </div>

                <button onclick="copyLink()" class="px-6 py-3 bg-slate-800 hover:bg-slate-700 rounded-2xl text-sm font-medium transition-colors">
                    📋 Скопировать ссылку
                </button>

                <button id="retry-btn" onclick="retryConnection()" class="hidden mt-4 px-5 py-2 text-sm bg-slate-700 hover:bg-slate-600 rounded-2xl">
                    🔄 Попробовать снова
                </button>
            </div>
        </div>

        <!-- Connected Screen -->
        <div id="connectedScreen" class="hidden">
            <div class="bg-emerald-950 border border-emerald-800 rounded-3xl p-6 mb-6">
                <div class="flex items-center gap-x-3">
                    <div class="w-3 h-3 bg-emerald-400 rounded-full animate-pulse"></div>
                    <span class="font-semibold text-emerald-400">Соединение установлено</span>
                </div>
            </div>

            <div class="bg-slate-900 border border-slate-800 rounded-3xl p-8">
                <h3 class="text-xl font-semibold mb-4">Отправить файлы</h3>
                
                <div class="border-2 border-dashed border-slate-700 rounded-2xl p-8 text-center mb-6 hover:border-slate-600 transition-colors">
                    <input type="file" id="fileInput" multiple class="hidden">
                    <button onclick="document.getElementById('fileInput').click()" class="px-8 py-3 bg-cyan-600 hover:bg-cyan-500 rounded-2xl font-semibold transition-colors">
                        📁 Выбрать файлы
                    </button>
                    <p class="text-xs text-slate-500 mt-3">Или перетащите файлы сюда</p>
                </div>

                <div id="progressContainer" class="hidden mb-4">
                    <div class="flex justify-between text-sm mb-1">
                        <span id="progressFileName"></span>
                        <span id="progressPercent">0%</span>
                    </div>
                    <div class="w-full bg-slate-800 rounded-full h-2">
                        <div id="progressBar" class="progress-bar bg-cyan-500 h-2 rounded-full" style="width: 0%"></div>
                    </div>
                </div>
            </div>

            <div class="mt-8">
                <h3 class="text-xl font-semibold mb-4">Полученные файлы</h3>
                <div id="receivedFiles" class="space-y-3"></div>
            </div>
        </div>
    </div>

    <script>
        let peer, conn, currentRoomId = '', receivedChunks = {}, isGuest = false;

        function generateRoomId() {
            return Math.random().toString(36).substring(2, 10);
        }

        function initPeer() {
            const roomFromUrl = new URLSearchParams(window.location.search).get('room');

            if (roomFromUrl) {
                // GUEST
                isGuest = true;
                currentRoomId = roomFromUrl;
                document.getElementById('roomId').textContent = currentRoomId;
                document.getElementById('qrcode-container').style.display = 'none';
                document.getElementById('host-preparing').style.display = 'none';
                document.getElementById('guest-connecting').classList.remove('hidden');

                peer = new Peer();
                peer.on('open', () => {
                    document.getElementById('guest-status-text').textContent = 'Подключение...';
                    setTimeout(() => {
                        conn = peer.connect(currentRoomId);
                        setupConnection(conn);
                    }, 700);
                });
                peer.on('error', () => {
                    document.getElementById('guest-status-text').textContent = 'Ошибка подключения';
                    document.getElementById('retry-btn').classList.remove('hidden');
                });
            } else {
                // HOST
                currentRoomId = generateRoomId();
                document.getElementById('roomId').textContent = currentRoomId;
                document.getElementById('host-preparing').style.display = 'block';
                document.getElementById('qrcode-container').style.display = 'none';

                peer = new Peer(currentRoomId);
                peer.on('open', (id) => {
                    document.getElementById('host-preparing').style.display = 'none';
                    showQRCode(id);
                });
                peer.on('connection', (c) => { conn = c; setupConnection(c); });
            }
        }

        function showQRCode(roomId) {
            const container = document.getElementById('qrcode-container');
            const img = document.getElementById('qr-image');
            const url = window.location.origin + window.location.pathname + '?room=' + roomId;
            img.src = 'https://api.qrserver.com/v1/create-qr-code/?size=200x200&data=' + encodeURIComponent(url);
            container.style.display = 'inline-block';
        }

        function setupConnection(connection) {
            connection.on('open', () => {
                document.getElementById('connectScreen').classList.add('hidden');
                document.getElementById('connectedScreen').classList.remove('hidden');
                document.getElementById('fileInput').addEventListener('change', handleFileSelect);
            });
            connection.on('data', handleIncomingData);
        }

        function handleFileSelect(e) {
            for (const file of e.target.files) sendFile(file);
            e.target.value = '';
        }

        async function sendFile(file) {
            const chunkSize = 64 * 1024;
            const total = Math.ceil(file.size / chunkSize);
            conn.send({ type: 'file-meta', name: file.name, size: file.size, totalChunks: total });

            const progressContainer = document.getElementById('progressContainer');
            const bar = document.getElementById('progressBar');
            const pct = document.getElementById('progressPercent');
            const nameEl = document.getElementById('progressFileName');

            progressContainer.classList.remove('hidden');
            nameEl.textContent = file.name;
            bar.style.width = '0%';
            pct.textContent = '0%';

            const reader = new FileReader();
            let offset = 0, idx = 0;

            reader.onload = e => {
                conn.send({ type: 'file-chunk', name: file.name, chunkIndex: idx, data: Array.from(new Uint8Array(e.target.result)) });
                idx++;
                const percent = Math.round((idx / total) * 100);
                bar.style.width = percent + '%';
                pct.textContent = percent + '%';

                if (offset < file.size) {
                    offset += chunkSize;
                    reader.readAsArrayBuffer(file.slice(offset, offset + chunkSize));
                } else {
                    setTimeout(() => progressContainer.classList.add('hidden'), 700);
                }
            };
            reader.readAsArrayBuffer(file.slice(0, chunkSize));
        }

        function handleIncomingData(data) {
            if (data.type === 'file-meta') {
                receivedChunks[data.name] = { chunks: [], total: data.totalChunks, size: data.size };
            }
            if (data.type === 'file-chunk') {
                const f = receivedChunks[data.name];
                if (!f) return;
                f.chunks[data.chunkIndex] = new Uint8Array(data.data);
                if (f.chunks.length === f.total) {
                    const blob = new Blob(f.chunks);
                    showReceivedFile(data.name, blob, f.size);
                    delete receivedChunks[data.name];
                }
            }
        }

        function showReceivedFile(name, blob, size) {
            const el = document.createElement('div');
            el.className = 'file-card bg-slate-900 border border-slate-700 rounded-2xl p-4 flex justify-between items-center';
            el.innerHTML = `
                <div><div class="font-medium">${name}</div><div class="text-sm text-slate-400">${(size/1024/1024).toFixed(2)} MB</div></div>
                <button class="px-5 py-2 bg-emerald-600 rounded-2xl text-sm">Скачать</button>
            `;
            el.querySelector('button').onclick = () => {
                const a = document.createElement('a');
                a.href = URL.createObjectURL(blob);
                a.download = name;
                a.click();
            };
            document.getElementById('receivedFiles').appendChild(el);
        }

        function copyLink() {
            const url = `${window.location.origin}${window.location.pathname}?room=${currentRoomId}`;
            navigator.clipboard.writeText(url);
        }

        function retryConnection() {
            document.getElementById('retry-btn').classList.add('hidden');
            if (peer) peer.destroy();
            setTimeout(initPeer, 300);
        }

        function init() { initPeer(); }
        window.onload = init;
    </script>
</body>
</html>
