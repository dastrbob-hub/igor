<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Морской бой</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Roboto+Mono:wght@400;500&display=swap');
        body { background: linear-gradient(135deg, #0a1628 0%, #0d1b2a 100%); color: #e3f2fd; font-family: 'Inter', system_ui, sans-serif; padding: 20px; }
        .container { max-width: 1200px; margin: 0 auto; }
        .section { background: #132238; border-radius: 16px; padding: 24px; margin-bottom: 24px; border: 1px solid rgba(0, 212, 255, 0.1); }
        .battleship-grid { display: grid; grid-template-columns: 28px repeat(10, minmax(30px, 38px)); gap: 3px; background: #0d47a1; padding: 4px; border-radius: 12px; }
        .cell { background: #4fc3f7; border: 1px solid #0288d1; border-radius: 6px; display: flex; align-items: center; justify-content: center; font-size: 20px; color: white; cursor: crosshair; }
        .cell.own { background: #546e7a; cursor: default; }
        .cell.hit { background: #e53935; }
        .cell.miss { background: #81d4fa; }
        .turn-indicator { text-align: center; font-size: 1.3rem; font-weight: 700; padding: 14px; background: #1a2f4a; border-radius: 9999px; margin: 10px auto; max-width: 420px; border: 2px solid #00bcd4; }
        .turn-indicator.your-turn { background: #00695c; border-color: #4caf50; }
    </style>
</head>
<body>
    <div class="container">
        <header style="text-align:center; margin-bottom:30px;">
            <h1 style="font-size:3rem; background: linear-gradient(90deg, #00d4ff, #00bcd4); -webkit-background-clip: text; -webkit-text-fill-color: transparent;">⚓ Морской бой</h1>
            <p style="color:#90caf9;">Игра запущена внутри хаба • WebRTC соединение управляется родительской страницей</p>
        </header>

        <div class="section" id="pregameSection">
            <h2 style="color:#00d4ff; margin-bottom:16px;">🚢 Расстановка кораблей</h2>
            <div style="display:flex; gap:12px; justify-content:center; flex-wrap:wrap;">
                <button id="placeShipsBtn" style="background:#00bcd4; color:white; border:none; padding:12px 24px; border-radius:10px; font-weight:600;">🎲 Автоматически расставить</button>
                <button id="readyBtn" style="background:#455a64; color:white; border:none; padding:12px 24px; border-radius:10px; font-weight:600;" disabled>⚔️ Я готов к бою!</button>
            </div>
        </div>

        <div class="section" id="gameSection" style="display:none;">
            <div id="turnIndicator" class="turn-indicator">Ожидание начала игры...</div>
            <div style="display:flex; gap:30px; justify-content:center; flex-wrap:wrap;">
                <div>
                    <h3 style="text-align:center; margin-bottom:12px; color:#90caf9;">Моё поле</h3>
                    <div id="myGridContainer"></div>
                </div>
                <div>
                    <h3 style="text-align:center; margin-bottom:12px; color:#90caf9;">Поле противника</h3>
                    <div id="enemyGridContainer"></div>
                </div>
            </div>
        </div>
    </div>

    <script>
        // ==================== GAME STATE ====================
        let myShipsGrid = [];
        let myHitsGrid = [];
        let myMissesGrid = [];
        let myShips = [];
        let myShotsOnEnemy = [];
        let localReady = false;
        let opponentReady = false;
        let myTurn = false;
        let gameStarted = false;
        let gameOver = false;
        let waitingForResult = false;

        const GRID_SIZE = 10;
        const LETTERS = 'АБВГДЕЖЗИК';
        const SHIP_CONFIG = [ { size: 4, count: 1 }, { size: 3, count: 2 }, { size: 2, count: 3 }, { size: 1, count: 4 } ];

        let myGridContainer, enemyGridContainer;

        // ==================== POSTMESSAGE BRIDGE (new architecture) ====================
        function sendToHub(msg) {
            window.parent.postMessage(JSON.stringify(msg), '*');
        }

        window.addEventListener('message', (event) => {
            try {
                const msg = JSON.parse(event.data);
                handleMessage(msg);
            } catch(e) {}
        });

        // ==================== GAME LOGIC ====================
        function initGrids() {
            myShipsGrid = Array.from({ length: GRID_SIZE }, () => Array(GRID_SIZE).fill(0));
            myHitsGrid = Array.from({ length: GRID_SIZE }, () => Array(GRID_SIZE).fill(false));
            myMissesGrid = Array.from({ length: GRID_SIZE }, () => Array(GRID_SIZE).fill(false));
            myShips = [];
            myShotsOnEnemy = Array.from({ length: GRID_SIZE }, () => Array(GRID_SIZE).fill('empty'));
        }

        function canPlaceShip(grid, startX, startY, size, horizontal) {
            for (let i = 0; i < size; i++) {
                const x = horizontal ? startX + i : startX;
                const y = horizontal ? startY : startY + i;
                if (x < 0 || x >= GRID_SIZE || y < 0 || y >= GRID_SIZE || grid[y][x] !== 0) return false;
            }
            return true;
        }

        function placeSingleShip(grid, shipsList, size, id) {
            let placed = false;
            let attempts = 0;
            while (!placed && attempts < 800) {
                attempts++;
                const horizontal = Math.random() > 0.5;
                const startX = Math.floor(Math.random() * (GRID_SIZE - (horizontal ? size : 0)));
                const startY = Math.floor(Math.random() * (GRID_SIZE - (horizontal ? 0 : size)));
                if (canPlaceShip(grid, startX, startY, size, horizontal)) {
                    const positions = [];
                    for (let i = 0; i < size; i++) {
                        const x = horizontal ? startX + i : startX;
                        const y = horizontal ? startY : startY + i;
                        grid[y][x] = id;
                        positions.push({ x, y });
                    }
                    shipsList.push({ id, size, positions, hits: 0, isSunk: false });
                    placed = true;
                }
            }
            return placed;
        }

        function autoPlaceShips() {
            initGrids();
            let currentId = 1;
            const shipsToPlace = [];
            SHIP_CONFIG.forEach(c => { for (let i=0; i<c.count; i++) shipsToPlace.push(c.size); });
            shipsToPlace.sort((a,b)=>b-a);
            shipsToPlace.forEach(size => placeSingleShip(myShipsGrid, myShips, size, currentId++));
            renderMyGrid();
            renderEnemyGrid();
        }

        function renderMyGrid() {
            const container = document.getElementById('myGridContainer');
            container.innerHTML = '';
            const grid = document.createElement('div');
            grid.className = 'battleship-grid';
            for (let row = 0; row <= GRID_SIZE; row++) {
                for (let col = 0; col <= GRID_SIZE; col++) {
                    const cell = document.createElement('div');
                    if (row === 0 && col === 0) { cell.style.background = 'transparent'; }
                    else if (row === 0) { cell.textContent = LETTERS[col-1]; cell.style.fontSize = '12px'; cell.style.color = '#bbdefb'; }
                    else if (col === 0) { cell.textContent = row; cell.style.fontSize = '12px'; cell.style.color = '#bbdefb'; }
                    else {
                        const x = col-1, y = row-1;
                        cell.className = 'cell own';
                        cell.dataset.x = x; cell.dataset.y = y;
                        if (myShipsGrid[y][x] !== 0) cell.style.background = '#546e7a';
                    }
                    grid.appendChild(cell);
                }
            }
            container.appendChild(grid);
        }

        function renderEnemyGrid() {
            const container = document.getElementById('enemyGridContainer');
            container.innerHTML = '';
            const grid = document.createElement('div');
            grid.className = 'battleship-grid';
            for (let row = 0; row <= GRID_SIZE; row++) {
                for (let col = 0; col <= GRID_SIZE; col++) {
                    const cell = document.createElement('div');
                    if (row === 0 && col === 0) { cell.style.background = 'transparent'; }
                    else if (row === 0) { cell.textContent = LETTERS[col-1]; cell.style.fontSize = '12px'; cell.style.color = '#bbdefb'; }
                    else if (col === 0) { cell.textContent = row; cell.style.fontSize = '12px'; cell.style.color = '#bbdefb'; }
                    else {
                        const x = col-1, y = row-1;
                        cell.className = 'cell';
                        cell.dataset.x = x; cell.dataset.y = y;
                        cell.addEventListener('click', () => handleEnemyCellClick(x, y));
                    }
                    grid.appendChild(cell);
                }
            }
            container.appendChild(grid);
        }

        function handleEnemyCellClick(x, y) {
            if (!myTurn || gameOver || waitingForResult || myShotsOnEnemy[y][x] !== 'empty') return;
            waitingForResult = true;
            myTurn = false;
            updateTurnIndicator();
            sendToHub({ type: 'shot', x, y });
        }

        function handleMessage(msg) {
            switch (msg.type) {
                case 'shot':
                    handleIncomingShot(msg.x, msg.y);
                    break;
                case 'shotResult':
                    handleShotResult(msg);
                    break;
                case 'ready':
                    opponentReady = true;
                    checkBothReady();
                    break;
                case 'startGame':
                    gameStarted = true;
                    myTurn = !!msg.yourTurn;
                    updateTurnIndicator();
                    document.getElementById('placeShipsBtn').disabled = true;
                    document.getElementById('readyBtn').disabled = true;
                    break;
                case 'connection_ready':
                    // Parent confirmed WebRTC is active
                    document.getElementById('readyBtn').disabled = false;
                    break;
            }
        }

        function handleIncomingShot(x, y) {
            let result = 'miss';
            let sunkPositions = null;
            const shipId = myShipsGrid[y][x];
            if (shipId !== 0) {
                if (!myHitsGrid[y][x]) {
                    myHitsGrid[y][x] = true;
                    const ship = myShips.find(s => s.id === shipId);
                    if (ship) {
                        ship.hits++;
                        if (ship.hits === ship.size) { ship.isSunk = true; result = 'sunk'; sunkPositions = ship.positions; }
                        else result = 'hit';
                    }
                }
            } else {
                myMissesGrid[y][x] = true;
                result = 'miss';
            }
            const isGameOverNow = myShips.every(s => s.hits === s.size);
            sendToHub({ type: 'shotResult', x, y, result, gameOver: isGameOverNow, sunkPositions });
            if (result === 'miss' && !isGameOverNow) { myTurn = true; updateTurnIndicator(); }
        }

        function handleShotResult(msg) {
            const { x, y, result, gameOver: opponentGameOver, sunkPositions } = msg;
            myShotsOnEnemy[y][x] = result;
            if (sunkPositions) sunkPositions.forEach(pos => myShotsOnEnemy[pos.y][pos.x] = 'sunk');
            waitingForResult = false;
            if (opponentGameOver) { endGame(true); return; }
            myTurn = (result !== 'miss');
            updateTurnIndicator();
        }

        function checkBothReady() {
            if (localReady && opponentReady && !gameStarted) {
                if (isHost) {
                    const iStartFirst = Math.random() > 0.5;
                    myTurn = iStartFirst;
                    sendToHub({ type: 'startGame', yourTurn: !iStartFirst });
                    gameStarted = true;
                    updateTurnIndicator();
                }
            }
        }

        function updateTurnIndicator() {
            const el = document.getElementById('turnIndicator');
            if (!gameStarted) { el.textContent = 'Ожидание начала игры...'; el.classList.remove('your-turn'); return; }
            if (myTurn) { el.innerHTML = '🎯 <strong>ВАШ ХОД!</strong>'; el.classList.add('your-turn'); }
            else { el.innerHTML = '⏳ Ход противника...'; el.classList.remove('your-turn'); }
        }

        function endGame(won) {
            gameOver = true;
            alert(won ? 'ПОБЕДА!' : 'ПОРАЖЕНИЕ');
        }

        // ==================== INIT ====================
        function init() {
            myGridContainer = document.getElementById('myGridContainer');
            enemyGridContainer = document.getElementById('enemyGridContainer');

            initGrids();
            renderMyGrid();
            renderEnemyGrid();

            document.getElementById('placeShipsBtn').addEventListener('click', () => {
                autoPlaceShips();
            });

            document.getElementById('readyBtn').addEventListener('click', () => {
                if (!localReady) {
                    localReady = true;
                    document.getElementById('readyBtn').textContent = '✅ Готов!';
                    document.getElementById('readyBtn').disabled = true;
                    sendToHub({ type: 'ready' });
                    checkBothReady();
                }
            });

            // Tell parent we are ready to receive connection status
            setTimeout(() => {
                window.parent.postMessage(JSON.stringify({ type: 'game_loaded' }), '*');
            }, 300);

            console.log('%c[Морской бой] Игра загружена в iframe режиме', 'color:#67e8f9');
        }

        window.onload = init;
    </script>
</body>
</html>
