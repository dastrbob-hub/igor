<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TIFF Merger • Объединение TIFF</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/utif.js/3.1.0/UTIF._min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Space+Grotesk:wght@500;600&display=swap');
        body { font-family: 'Inter', system-ui, sans-serif; }
        .title-font { font-family: 'Space Grotesk', system-ui, sans-serif; }
        .dropzone {
            transition: all 0.2s ease;
        }
        .dropzone.dragover {
            background-color: #0f172a;
            border-color: #64748b;
        }
        .page-item {
            transition: all 0.2s ease;
        }
        .page-item:hover {
            background-color: #1e2937;
        }
    </style>
</head>
<body class="bg-slate-950 text-slate-200">
    <div class="max-w-4xl mx-auto px-6 py-8">
        <!-- Header -->
        <div class="flex items-center justify-between mb-8">
            <div>
                <h1 class="text-4xl font-bold tracking-tighter title-font">TIFF Merger</h1>
                <p class="text-slate-400 mt-1">Объединение нескольких TIFF в один многостраничный файл</p>
            </div>
            <a href="index.html" class="text-sm px-4 py-2 rounded-2xl bg-slate-900 hover:bg-slate-800 transition-colors flex items-center gap-x-2">
                <span>← Назад в хаб</span>
            </a>
        </div>

        <!-- Drop Zone -->
        <div id="dropzone"
             class="dropzone border-2 border-dashed border-slate-700 rounded-3xl p-12 text-center cursor-pointer hover:border-slate-600 transition-colors">
            <div class="mx-auto w-16 h-16 bg-slate-900 rounded-2xl flex items-center justify-center mb-4">
                <svg xmlns="http://www.w3.org/2000/svg" class="w-8 h-8 text-slate-400" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M7 16a4 4 0 01-.88-7.903A5 5 0 1115.9 6L16 6a5 5 0 011 9.9M15 13l-3-3m0 0l-3 3m3-3v12" />
                </svg>
            </div>
            <h3 class="text-xl font-semibold mb-1">Перетащите TIFF файлы сюда</h3>
            <p class="text-slate-400 mb-4">или нажмите для выбора</p>
            <input type="file" id="fileInput" multiple accept="image/tiff,.tif" class="hidden">
            <button onclick="document.getElementById('fileInput').click()"
                    class="px-6 py-2.5 bg-slate-800 hover:bg-slate-700 rounded-2xl text-sm font-medium transition-colors">
                Выбрать файлы
            </button>
            <p class="text-xs text-slate-500 mt-4">Поддерживаются обычные RGB и Grayscale TIFF</p>
        </div>

        <!-- Pages List -->
        <div id="pagesSection" class="hidden mt-8">
            <div class="flex items-center justify-between mb-4">
                <h2 class="text-xl font-semibold">Загруженные страницы <span id="pageCount" class="text-slate-400 font-normal">(0)</span></h2>
                <button onclick="clearAll()"
                        class="text-sm px-4 py-2 text-red-400 hover:text-red-300 transition-colors flex items-center gap-x-2">
                    <span>Очистить все</span>
                </button>
            </div>

            <div id="pagesList" class="space-y-2 bg-slate-900 border border-slate-800 rounded-3xl p-2">
                <!-- JS populated -->
            </div>

            <div class="mt-6 flex gap-4">
                <button onclick="downloadAsTIFF()"
                        class="flex-1 py-4 bg-cyan-600 hover:bg-cyan-500 transition-colors rounded-3xl font-semibold text-lg flex items-center justify-center gap-x-3">
                    <span>Скачать как TIFF</span>
                </button>

                <button onclick="downloadAsPDF()"
                        class="flex-1 py-4 bg-emerald-600 hover:bg-emerald-500 transition-colors rounded-3xl font-semibold text-lg flex items-center justify-center gap-x-3">
                    <span>Скачать как PDF</span>
                </button>
            </div>
            <p class="text-center text-xs text-slate-500 mt-3">Обе кнопки работают. TIFF создается через UTIF.</p>
        </div>
    </div>

    <script>
        let pages = []; // { id, name, canvas }

        function setupDropzone() {
            const dropzone = document.getElementById('dropzone');
            const fileInput = document.getElementById('fileInput');

            dropzone.addEventListener('click', () => fileInput.click());

            dropzone.addEventListener('dragover', (e) => {
                e.preventDefault();
                dropzone.classList.add('dragover');
            });

            dropzone.addEventListener('dragleave', () => {
                dropzone.classList.remove('dragover');
            });

            dropzone.addEventListener('drop', (e) => {
                e.preventDefault();
                dropzone.classList.remove('dragover');
                handleFiles(e.dataTransfer.files);
            });

            fileInput.addEventListener('change', (e) => {
                handleFiles(e.target.files);
                e.target.value = '';
            });
        }

        async function handleFiles(fileList) {
            const files = Array.from(fileList).filter(f => 
                f.type === 'image/tiff' || f.name.toLowerCase().endsWith('.tif') || f.name.toLowerCase().endsWith('.tiff')
            );

            if (files.length === 0) {
                alert('Пожалуйста, загружайте только TIFF файлы');
                return;
            }

            document.getElementById('pagesSection').classList.remove('hidden');

            for (const file of files) {
                try {
                    const canvas = await fileToCanvas(file);
                    pages.push({ id: Date.now() + Math.random(), name: file.name, canvas });
                } catch (err) {
                    alert(`Не удалось обработать: ${file.name}`);
                }
            }
            renderPagesList();
        }

        async function fileToCanvas(file) {
            return new Promise((resolve, reject) => {
                const reader = new FileReader();
                reader.onload = (e) => {
                    const img = new Image();
                    img.onload = () => {
                        const canvas = document.createElement('canvas');
                        canvas.width = img.width;
                        canvas.height = img.height;
                        const ctx = canvas.getContext('2d');
                        ctx.drawImage(img, 0, 0);
                        resolve(canvas);
                    };
                    img.onerror = reject;
                    img.src = e.target.result;
                };
                reader.onerror = reject;
                reader.readAsDataURL(file);
            });
        }

        function renderPagesList() {
            const container = document.getElementById('pagesList');
            container.innerHTML = '';

            document.getElementById('pageCount').textContent = `(${pages.length})`;

            pages.forEach((page, index) => {
                const div = document.createElement('div');
                div.className = 'page-item flex items-center justify-between bg-slate-800 border border-slate-700 rounded-2xl px-4 py-3';

                div.innerHTML = `
                    <div class="flex items-center gap-x-4">
                        <div class="w-9 h-9 bg-slate-700 rounded-xl flex items-center justify-center text-xs font-mono">${index + 1}</div>
                        <div>
                            <div class="font-medium text-sm">${page.name}</div>
                            <div class="text-xs text-slate-500">${page.canvas.width} × ${page.canvas.height}</div>
                        </div>
                    </div>
                    <div class="flex gap-x-1">
                        <button onclick="movePage(${index}, -1)" class="px-3 py-1 text-slate-400 hover:text-white">↑</button>
                        <button onclick="movePage(${index}, 1)" class="px-3 py-1 text-slate-400 hover:text-white">↓</button>
                        <button onclick="deletePage(${index})" class="px-3 py-1 text-red-400 hover:text-red-300">✕</button>
                    </div>
                `;
                container.appendChild(div);
            });
        }

        function movePage(index, dir) {
            const newIndex = index + dir;
            if (newIndex < 0 || newIndex >= pages.length) return;
            [pages[index], pages[newIndex]] = [pages[newIndex], pages[index]];
            renderPagesList();
        }

        function deletePage(index) {
            pages.splice(index, 1);
            renderPagesList();
        }

        function clearAll() {
            pages = [];
            document.getElementById('pagesList').innerHTML = '';
            document.getElementById('pagesSection').classList.add('hidden');
        }

        // ==================== RELIABLE TIFF EXPORT USING UTIF ====================

        async function downloadAsTIFF() {
            if (pages.length === 0) return alert('Нет страниц');

            try {
                const tiffBuffer = await createMultiPageTIFFWithUTIF(pages);
                const blob = new Blob([tiffBuffer], { type: 'image/tiff' });
                const url = URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url;
                a.download = `merged_${pages.length}_pages.tiff`;
                document.body.appendChild(a);
                a.click();
                document.body.removeChild(a);
                URL.revokeObjectURL(url);
            } catch (err) {
                console.error(err);
                alert('Ошибка при создании TIFF. Попробуйте PDF.');
            }
        }

        async function createMultiPageTIFFWithUTIF(pagesArray) {
            const ifds = [];

            for (const page of pagesArray) {
                const ctx = page.canvas.getContext('2d');
                const imageData = ctx.getImageData(0, 0, page.canvas.width, page.canvas.height);

                // UTIF.encodeImage expects RGBA data
                const tiffPage = UTIF.encodeImage(imageData.data, page.canvas.width, page.canvas.height);

                // Decode the single page to get the IFD object
                const decoded = UTIF.decode(tiffPage);
                ifds.push(decoded[0]);
            }

            // Encode all IFDs into one multi-page TIFF
            const multiPageBuffer = UTIF.encode(ifds);
            return multiPageBuffer;
        }

        // ==================== PDF EXPORT ====================

        async function downloadAsPDF() {
            if (pages.length === 0) return alert('Нет страниц');

            const { jsPDF } = window.jspdf;
            const pdf = new jsPDF({
                orientation: 'portrait',
                unit: 'px',
                format: [pages[0].canvas.width, pages[0].canvas.height]
            });

            for (let i = 0; i < pages.length; i++) {
                const page = pages[i];
                const imgData = page.canvas.toDataURL('image/jpeg', 0.92);

                if (i > 0) {
                    pdf.addPage([page.canvas.width, page.canvas.height]);
                }

                pdf.addImage(imgData, 'JPEG', 0, 0, page.canvas.width, page.canvas.height);
            }

            pdf.save(`merged_${pages.length}_pages.pdf`);
        }

        function init() {
            setupDropzone();
            console.log('%c[TIFF Merger] Инструмент готов с UTIF', 'color:#14b8a6');
        }

        window.onload = init;
    </script>
</body>
</html>
