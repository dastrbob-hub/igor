<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TIFF → PDF Merger</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/utif.js/3.1.0/UTIF._min.js"></script>
    <style>
        body { font-family: 'Inter', system-ui, sans-serif; }
        .dropzone { transition: all 0.2s ease; }
        .dropzone.dragover { background-color: #0f172a; border-color: #64748b; }
    </style>
</head>
<body class="bg-slate-950 text-slate-200">
    <div class="max-w-4xl mx-auto px-6 py-8">
        <div class="flex items-center justify-between mb-8">
            <div>
                <h1 class="text-4xl font-bold tracking-tighter">TIFF → PDF Merger</h1>
                <p class="text-slate-400 mt-1">Объедини TIFF-сканы в один PDF с нужным порядком страниц</p>
            </div>
            <a href="index.html" class="text-sm px-4 py-2 rounded-2xl bg-slate-900 hover:bg-slate-800 transition-colors">← Назад в хаб</a>
        </div>

        <!-- Drop Zone -->
        <div id="dropzone"
             class="dropzone border-2 border-dashed border-slate-700 rounded-3xl p-12 text-center cursor-pointer hover:border-slate-600 transition-colors">
            <div class="mx-auto w-16 h-16 bg-slate-900 rounded-2xl flex items-center justify-center mb-4">
                <svg xmlns="http://www.w3.org/2000/svg" class="w-8 h-8 text-slate-400" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M7 16a4 4 0 01-.88-7.903A5 5 0 1115.9 6L16 6a5 5 0 011 9.9M15 13l-3-3m0 0l-3 3m3-3v12" />
                </svg>
            </div>
            <h3 class="text-xl font-semibold mb-1">Перетащи TIFF файлы сюда</h3>
            <p class="text-slate-400 mb-4">или нажми для выбора</p>
            <input type="file" id="fileInput" multiple accept="image/tiff,.tif,.tiff" class="hidden">
            <button onclick="document.getElementById('fileInput').click()"
                    class="px-6 py-2.5 bg-slate-800 hover:bg-slate-700 rounded-2xl text-sm font-medium transition-colors">
                Выбрать файлы
            </button>
            <p class="text-xs text-slate-500 mt-4">Поддерживаются обычные и многостраничные TIFF</p>
        </div>

        <!-- Pages List -->
        <div id="pagesSection" class="hidden mt-8">
            <div class="flex items-center justify-between mb-4">
                <h2 class="text-xl font-semibold">Страницы <span id="pageCount" class="text-slate-400 font-normal">(0)</span></h2>
                <button onclick="clearAll()" class="text-sm px-4 py-2 text-red-400 hover:text-red-300 transition-colors">
                    Очистить всё
                </button>
            </div>

            <div id="pagesList" class="space-y-2 bg-slate-900 border border-slate-800 rounded-3xl p-2 max-h-[420px] overflow-y-auto">
                <!-- Populated by JS -->
            </div>

            <div class="mt-6">
                <button onclick="downloadAsPDF()"
                        class="w-full py-4 bg-emerald-600 hover:bg-emerald-500 transition-colors rounded-3xl font-semibold text-lg flex items-center justify-center gap-x-3">
                    <span>Скачать как PDF</span>
                </button>
            </div>
            <p class="text-center text-xs text-slate-500 mt-3">Меняй порядок страниц стрелками ↑ ↓</p>
        </div>
    </div>

    <script>
        let pages = []; // { id, name, data: base64, w, h }

        function setupDropzone() {
            const dropzone = document.getElementById('dropzone');
            const fileInput = document.getElementById('fileInput');

            dropzone.addEventListener('click', () => fileInput.click());

            dropzone.addEventListener('dragover', (e) => {
                e.preventDefault();
                dropzone.classList.add('dragover');
            });

            dropzone.addEventListener('dragleave', () => dropzone.classList.remove('dragover'));

            dropzone.addEventListener('drop', (e) => {
                e.preventDefault();
                dropzone.classList.remove('dragover');
                handleFiles(e.dataTransfer.files);
            });

            fileInput.addEventListener('change', (e) => {
                handleFiles(e.target.files);
                e.target.value = '';
            });
        }

        async function handleFiles(fileList) {
            const files = Array.from(fileList).filter(f => 
                f.type.includes('tiff') || 
                f.name.toLowerCase().endsWith('.tif') || 
                f.name.toLowerCase().endsWith('.tiff')
            );

            if (files.length === 0) {
                alert('Загружай только TIFF файлы (.tif / .tiff)');
                return;
            }

            document.getElementById('pagesSection').classList.remove('hidden');

            for (const file of files) {
                try {
                    await processTIFFFile(file);
                } catch (err) {
                    console.error(err);
                    alert(`Не удалось обработать файл: ${file.name}\n${err.message || err}`);
                }
            }
            renderPagesList();
        }

        // Главная функция обработки TIFF по твоему алгоритму
        function processTIFFFile(file) {
            return new Promise((resolve, reject) => {
                const reader = new FileReader();

                reader.onload = function(e) {
                    try {
                        const buffer = e.target.result;
                        const ifds = UTIF.decode(buffer);

                        if (!ifds || ifds.length === 0) {
                            throw new Error('Файл не является валидным TIFF');
                        }

                        ifds.forEach((ifd, idx) => {
                            try {
                                UTIF.decodeImage(buffer, ifd);
                                const rgba = UTIF.toRGBA8(ifd);

                                const canvas = document.createElement('canvas');
                                canvas.width = ifd.width;
                                canvas.height = ifd.height;

                                const ctx = canvas.getContext('2d');
                                const imgData = ctx.createImageData(ifd.width, ifd.height);
                                imgData.data.set(rgba);
                                ctx.putImageData(imgData, 0, 0);

                                const imgBase64 = canvas.toDataURL('image/png');

                                pages.push({
                                    id: Date.now() + Math.random(),
                                    name: ifds.length > 1 ? `${file.name} (стр.${idx + 1})` : file.name,
                                    data: imgBase64,
                                    w: ifd.width,
                                    h: ifd.height
                                });
                            } catch (pageErr) {
                                console.warn('Пропущена страница:', pageErr);
                            }
                        });

                        resolve();
                    } catch (err) {
                        reject(err);
                    }
                };

                reader.onerror = () => reject(new Error('Ошибка чтения файла'));
                reader.readAsArrayBuffer(file);
            });
        }

        function renderPagesList() {
            const container = document.getElementById('pagesList');
            container.innerHTML = '';
            document.getElementById('pageCount').textContent = `(${pages.length})`;

            pages.forEach((page, index) => {
                const div = document.createElement('div');
                div.className = 'page-item flex items-center justify-between bg-slate-800 border border-slate-700 rounded-2xl px-4 py-3';

                div.innerHTML = `
                    <div class="flex items-center gap-x-4">
                        <div class="w-8 h-8 bg-slate-700 rounded-xl flex items-center justify-center text-xs font-mono font-bold">${index + 1}</div>
                        <div class="min-w-0">
                            <div class="font-medium text-sm truncate max-w-[280px]">${page.name}</div>
                            <div class="text-xs text-slate-500">${page.w} × ${page.h}</div>
                        </div>
                    </div>
                    <div class="flex items-center gap-x-1">
                        <button onclick="movePage(${index}, -1)" class="w-8 h-8 flex items-center justify-center text-slate-400 hover:text-white hover:bg-slate-700 rounded-xl">↑</button>
                        <button onclick="movePage(${index}, 1)" class="w-8 h-8 flex items-center justify-center text-slate-400 hover:text-white hover:bg-slate-700 rounded-xl">↓</button>
                        <button onclick="deletePage(${index})" class="w-8 h-8 flex items-center justify-center text-red-400 hover:text-red-300 hover:bg-slate-700 rounded-xl">✕</button>
                    </div>
                `;
                container.appendChild(div);
            });
        }

        function movePage(index, direction) {
            const newIndex = index + direction;
            if (newIndex < 0 || newIndex >= pages.length) return;
            [pages[index], pages[newIndex]] = [pages[newIndex], pages[index]];
            renderPagesList();
        }

        function deletePage(index) {
            pages.splice(index, 1);
            renderPagesList();
            if (pages.length === 0) {
                document.getElementById('pagesSection').classList.add('hidden');
            }
        }

        function clearAll() {
            pages = [];
            document.getElementById('pagesList').innerHTML = '';
            document.getElementById('pagesSection').classList.add('hidden');
        }

        async function downloadAsPDF() {
            if (pages.length === 0) return;

            const { jsPDF } = window.jspdf;
            const first = pages[0];

            const pdf = new jsPDF({
                orientation: first.w > first.h ? 'landscape' : 'portrait',
                unit: 'px',
                format: [first.w, first.h]
            });

            for (let i = 0; i < pages.length; i++) {
                const page = pages[i];

                if (i > 0) {
                    pdf.addPage([page.w, page.h]);
                }

                pdf.addImage(page.data, 'PNG', 0, 0, page.w, page.h);
            }

            pdf.save(`merged_${pages.length}_pages.pdf`);
        }

        function init() {
            setupDropzone();
            console.log('%c[TIFF → PDF] Исправленная версия по твоему алгоритму загружена', 'color:#14b8a6');
        }

        window.onload = init;
    </script>
</body>
</html>
