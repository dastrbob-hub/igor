<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Век Империй • Пошаговая Стратегия</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        body { font-family: system-ui, sans-serif; background: #0f0f0f; color: #e5e5e5; }
        canvas { border: 2px solid #444; border-radius: 8px; background: #1a1a1a; image-rendering: crisp-edges; }
        .unit-info { background: #1a1a1a; border: 1px solid #333; }
        .log { font-size: 13px; }
    </style>
</head>
<body>
    <div class="max-w-[1100px] mx-auto p-6">
        <div class="flex items-center justify-between mb-6">
            <div class="flex items-center gap-x-4">
                <a href="index.html" class="text-[#c9a227] hover:underline flex items-center gap-x-2 text-sm">
                    <i class="fa-solid fa-arrow-left"></i> <span>Назад в Зал</span>
                </a>
                <h1 class="text-3xl font-semibold tracking-tight">Век Империй</h1>
            </div>
            <div class="flex items-center gap-x-4">
                <div id="turn-indicator" class="px-4 py-1.5 bg-[#c9a227] text-[#1a120b] rounded-full text-sm font-bold flex items-center gap-x-2">
                    <i class="fa-solid fa-user"></i>
                    <span>Ход игрока</span>
                </div>
                <button onclick="endTurn()" 
                        class="px-6 py-2 bg-[#c9a227] hover:bg-[#d4af37] text-[#1a120b] font-semibold rounded-2xl flex items-center gap-x-2 text-sm">
                    <i class="fa-solid fa-forward"></i>
                    <span>Закончить ход</span>
                </button>
            </div>
        </div>

        <div class="grid grid-cols-1 lg:grid-cols-12 gap-6">
            <!-- Canvas -->
            <div class="lg:col-span-8">
                <canvas id="game-canvas" width="600" height="600" class="cursor-pointer"></canvas>
            </div>

            <!-- Sidebar -->
            <div class="lg:col-span-4 space-y-4">
                <!-- Selected Unit -->
                <div class="unit-info rounded-2xl p-5">
                    <div class="text-xs text-[#888] mb-1">ВЫБРАННЫЙ ЮНИТ</div>
                    <div id="selected-info" class="min-h-[80px]">
                        <div class="text-[#666] text-sm">Кликни по юниту</div>
                    </div>
                </div>

                <!-- Legend -->
                <div class="unit-info rounded-2xl p-5 text-sm">
                    <div class="font-semibold mb-3 text-[#c9a227]">Легенда</div>
                    <div class="space-y-2 text-xs">
                        <div class="flex items-center gap-x-2"><span class="inline-block w-3 h-3 bg-blue-500 rounded"></span> <span>Твои юниты (синие)</span></div>
                        <div class="flex items-center gap-x-2"><span class="inline-block w-3 h-3 bg-red-500 rounded"></span> <span>Враг (красные)</span></div>
                        <div class="flex items-center gap-x-2"><span class="inline-block w-3 h-3 bg-[#555] rounded"></span> <span>Горы (непроходимы)</span></div>
                    </div>
                </div>

                <!-- Log -->
                <div class="unit-info rounded-2xl p-4">
                    <div class="font-semibold mb-2 text-[#c9a227] text-sm">Лог</div>
                    <div id="log" class="log h-40 overflow-auto text-xs space-y-0.5 text-[#aaa]"></div>
                </div>
            </div>
        </div>

        <div class="mt-4 text-xs text-[#666]">
            Кликни по своему юниту → затем кликни на клетку для перемещения или атаки. ИИ ходит автоматически после тебя.
        </div>
    </div>

    <script>
        // ==================== КЛАССЫ ====================
        class Unit {
            constructor(type, owner, x, y) {
                this.id = Date.now() + Math.random();
                this.type = type; // 'warrior' or 'archer'
                this.owner = owner; // 'player' or 'ai'
                this.x = x;
                this.y = y;
                this.hp = type === 'warrior' ? 120 : 80;
                this.maxHp = this.hp;
                this.attack = type === 'warrior' ? 22 : 18;
                this.defense = type === 'warrior' ? 10 : 6;
                this.movement = type === 'warrior' ? 3 : 4;
                this.range = type === 'warrior' ? 1 : 2;
                this.level = 1;
            }

            getColor() {
                return this.owner === 'player' ? '#3b82f6' : '#ef4444';
            }

            canAttack(target) {
                const dx = Math.abs(this.x - target.x);
                const dy = Math.abs(this.y - target.y);
                return dx + dy <= this.range;
            }

            attack(target) {
                if (!target || target.owner === this.owner) return 0;
                const damage = Math.max(5, this.attack - target.defense + Math.floor(Math.random() * 6));
                target.hp = Math.max(0, target.hp - damage);
                return damage;
            }

            takeDamage(dmg) {
                this.hp = Math.max(0, this.hp - dmg);
            }

            isAlive() {
                return this.hp > 0;
            }
        }

        class GameMap {
            constructor(size = 10) {
                this.size = size;
                this.tiles = Array(size).fill().map(() => Array(size).fill('plain'));
                // Добавим немного гор
                this.tiles[2][3] = 'mountain';
                this.tiles[3][3] = 'mountain';
                this.tiles[7][6] = 'mountain';
                this.tiles[6][7] = 'mountain';
            }

            isValid(x, y) {
                return x >= 0 && x < this.size && y >= 0 && y < this.size;
            }

            isPassable(x, y) {
                return this.tiles[y][x] !== 'mountain';
            }
        }

        class Player {
            constructor(name, isAI = false) {
                this.name = name;
                this.isAI = isAI;
                this.units = [];
            }

            addUnit(unit) {
                this.units.push(unit);
            }

            getAliveUnits() {
                return this.units.filter(u => u.isAlive());
            }
        }

        // ==================== ИГРА ====================
        let game;

        class Game {
            constructor() {
                this.canvas = document.getElementById('game-canvas');
                this.ctx = this.canvas.getContext('2d');
                this.map = new GameMap(10);
                this.tileSize = this.canvas.width / this.map.size;

                this.player = new Player('Игрок');
                this.ai = new Player('Враг', true);

                this.units = [];
                this.selectedUnit = null;
                this.currentPlayer = 'player';
                this.logEl = document.getElementById('log');

                this.initUnits();
                this.setupInput();
                this.render();
                this.addLog('Игра началась. Твой ход.');
            }

            initUnits() {
                // Игрок
                this.addUnit(new Unit('warrior', 'player', 1, 1));
                this.addUnit(new Unit('archer', 'player', 2, 2));
                this.addUnit(new Unit('warrior', 'player', 1, 3));

                // ИИ
                this.addUnit(new Unit('warrior', 'ai', 8, 7));
                this.addUnit(new Unit('archer', 'ai', 7, 8));
                this.addUnit(new Unit('warrior', 'ai', 8, 8));
            }

            addUnit(unit) {
                this.units.push(unit);
                if (unit.owner === 'player') this.player.addUnit(unit);
                else this.ai.addUnit(unit);
            }

            getUnitAt(x, y) {
                return this.units.find(u => u.x === x && u.y === y && u.isAlive());
            }

            setupInput() {
                this.canvas.addEventListener('click', (e) => {
                    if (this.currentPlayer !== 'player') return;

                    const rect = this.canvas.getBoundingClientRect();
                    const x = Math.floor((e.clientX - rect.left) / this.tileSize);
                    const y = Math.floor((e.clientY - rect.top) / this.tileSize);

                    const clickedUnit = this.getUnitAt(x, y);

                    if (this.selectedUnit) {
                        if (clickedUnit && clickedUnit.owner === 'player') {
                            this.selectedUnit = clickedUnit;
                        } else {
                            this.tryMoveOrAttack(this.selectedUnit, x, y);
                        }
                        this.render();
                    } else if (clickedUnit && clickedUnit.owner === 'player') {
                        this.selectedUnit = clickedUnit;
                        this.render();
                    }
                    this.updateSelectedInfo();
                });
            }

            tryMoveOrAttack(unit, targetX, targetY) {
                if (!unit || !unit.isAlive()) return;

                const targetUnit = this.getUnitAt(targetX, targetY);

                // Атака
                if (targetUnit && targetUnit.owner !== unit.owner && unit.canAttack(targetUnit)) {
                    const dmg = unit.attack(targetUnit);
                    this.addLog(`${unit.type} нанёс ${dmg} урона`);

                    if (!targetUnit.isAlive()) {
                        this.addLog(`${targetUnit.type} противника уничтожен!`);
                    }
                    this.selectedUnit = null;
                    this.checkWin();
                    return;
                }

                // Перемещение
                const dx = Math.abs(unit.x - targetX);
                const dy = Math.abs(unit.y - targetY);
                const dist = dx + dy;

                if (dist <= unit.movement && this.map.isPassable(targetX, targetY) && !this.getUnitAt(targetX, targetY)) {
                    unit.x = targetX;
                    unit.y = targetY;
                    this.selectedUnit = null;
                }
            }

            endPlayerTurn() {
                this.currentPlayer = 'ai';
                document.getElementById('turn-indicator').innerHTML = `<i class="fa-solid fa-robot"></i> <span>Ход ИИ...</span>`;
                this.selectedUnit = null;
                this.updateSelectedInfo();
                this.render();

                setTimeout(() => {
                    this.aiTurn();
                }, 600);
            }

            aiTurn() {
                const aliveAI = this.ai.getAliveUnits();
                const alivePlayer = this.player.getAliveUnits();

                if (aliveAI.length === 0 || alivePlayer.length === 0) {
                    this.checkWin();
                    return;
                }

                // Простой ИИ: идёт к ближайшему врагу и атакует если может
                for (let unit of aliveAI) {
                    if (!unit.isAlive()) continue;

                    let closest = null;
                    let minDist = 999;

                    for (let enemy of alivePlayer) {
                        if (!enemy.isAlive()) continue;
                        const d = Math.abs(unit.x - enemy.x) + Math.abs(unit.y - enemy.y);
                        if (d < minDist) {
                            minDist = d;
                            closest = enemy;
                        }
                    }

                    if (closest) {
                        if (unit.canAttack(closest)) {
                            const dmg = unit.attack(closest);
                            this.addLog(`ИИ ${unit.type} нанёс ${dmg} урона`);
                            if (!closest.isAlive()) this.addLog(`${closest.type} уничтожен!`);
                        } else {
                            // Движемся ближе
                            let nx = unit.x;
                            let ny = unit.y;
                            if (unit.x < closest.x) nx++;
                            else if (unit.x > closest.x) nx--;
                            else if (unit.y < closest.y) ny++;
                            else if (unit.y > closest.y) ny--;

                            if (this.map.isPassable(nx, ny) && !this.getUnitAt(nx, ny)) {
                                unit.x = nx;
                                unit.y = ny;
                            }
                        }
                    }
                }

                this.currentPlayer = 'player';
                document.getElementById('turn-indicator').innerHTML = `<i class="fa-solid fa-user"></i> <span>Ход игрока</span>`;
                this.render();
                this.checkWin();
            }

            checkWin() {
                const playerAlive = this.player.getAliveUnits().length;
                const aiAlive = this.ai.getAliveUnits().length;

                if (playerAlive === 0) {
                    this.addLog('Поражение! Все твои юниты уничтожены.');
                    alert('Поражение...');
                } else if (aiAlive === 0) {
                    this.addLog('Победа! Враг уничтожен.');
                    alert('Победа!');
                }
            }

            updateSelectedInfo() {
                const container = document.getElementById('selected-info');
                if (!this.selectedUnit) {
                    container.innerHTML = `<div class="text-[#666] text-sm">Кликни по своему юниту</div>`;
                    return;
                }
                const u = this.selectedUnit;
                container.innerHTML = `
                    <div class="font-semibold">${u.type.toUpperCase()} (ур. ${u.level})</div>
                    <div class="text-xs mt-1">HP: ${u.hp}/${u.maxHp}</div>
                    <div class="text-xs">Атака: ${u.attack} | Защита: ${u.defense}</div>
                    <div class="text-xs">Движение: ${u.movement} | Дальность: ${u.range}</div>
                `;
            }

            addLog(msg) {
                const div = document.createElement('div');
                div.textContent = msg;
                this.logEl.prepend(div);
                if (this.logEl.children.length > 12) this.logEl.lastChild.remove();
            }

            render() {
                const ctx = this.ctx;
                ctx.clearRect(0, 0, this.canvas.width, this.canvas.height);

                // Тайлы
                for (let y = 0; y < this.map.size; y++) {
                    for (let x = 0; x < this.map.size; x++) {
                        const px = x * this.tileSize;
                        const py = y * this.tileSize;

                        if (this.map.tiles[y][x] === 'mountain') {
                            ctx.fillStyle = '#444';
                        } else {
                            ctx.fillStyle = (x + y) % 2 === 0 ? '#1f2937' : '#111827';
                        }
                        ctx.fillRect(px, py, this.tileSize, this.tileSize);

                        // Сетка
                        ctx.strokeStyle = '#333';
                        ctx.strokeRect(px, py, this.tileSize, this.tileSize);
                    }
                }

                // Юниты
                for (let unit of this.units) {
                    if (!unit.isAlive()) continue;

                    const px = unit.x * this.tileSize + this.tileSize / 2;
                    const py = unit.y * this.tileSize + this.tileSize / 2;
                    const radius = this.tileSize * 0.35;

                    // Круг
                    ctx.beginPath();
                    ctx.arc(px, py, radius, 0, Math.PI * 2);
                    ctx.fillStyle = unit.getColor();
                    ctx.fill();
                    ctx.strokeStyle = '#fff';
                    ctx.lineWidth = 2;
                    ctx.stroke();

                    // HP бар
                    const hpPercent = unit.hp / unit.maxHp;
                    ctx.fillStyle = '#111';
                    ctx.fillRect(px - radius, py - radius - 8, radius * 2, 5);
                    ctx.fillStyle = hpPercent > 0.5 ? '#22c55e' : '#f87171';
                    ctx.fillRect(px - radius, py - radius - 8, radius * 2 * hpPercent, 5);

                    // Тип
                    ctx.fillStyle = '#fff';
                    ctx.font = 'bold 11px sans-serif';
                    ctx.textAlign = 'center';
                    ctx.fillText(unit.type[0].toUpperCase(), px, py + 4);
                }

                // Подсветка выбранного
                if (this.selectedUnit) {
                    const u = this.selectedUnit;
                    ctx.strokeStyle = '#c9a227';
                    ctx.lineWidth = 3;
                    ctx.strokeRect(u.x * this.tileSize + 2, u.y * this.tileSize + 2, 
                                   this.tileSize - 4, this.tileSize - 4);
                }
            }
        }

        function endTurn() {
            if (game.currentPlayer === 'player') {
                game.endPlayerTurn();
            }
        }

        // Старт
        function startGame() {
            game = new Game();
            window.game = game; // для отладки
        }

        window.onload = startGame;
    </script>
</body>
</html>
