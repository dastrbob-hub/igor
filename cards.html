<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Дурак</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>body { font-family: 'Inter', system_ui, sans-serif; } .card { width: 70px; height: 100px; border-radius: 8px; display: flex; align-items: center; justify-content: center; font-size: 22px; font-weight: bold; box-shadow: 0 4px 15px rgb(0 0 0 / 0.3); }</style>
</head>
<body class="bg-slate-950 text-slate-200 p-6">
    <div class="max-w-[1100px] mx-auto">
        <div class="flex items-center justify-between mb-6">
            <div class="flex items-center gap-x-4">
                <div class="w-12 h-12 bg-amber-500 rounded-2xl flex items-center justify-center text-3xl">🃏</div>
                <div><h1 class="text-4xl font-bold">Карточный Дурак</h1><p class="text-slate-400">Подкидной • Внутри хаба</p></div>
            </div>
            <div id="connStatus" class="px-4 py-2 bg-slate-900 border border-amber-700 rounded-3xl text-sm">Подключено через хаб</div>
        </div>

        <div class="grid grid-cols-1 lg:grid-cols-3 gap-6">
            <div class="bg-slate-900 border border-slate-700 rounded-3xl p-5">
                <div class="text-amber-400 font-bold mb-3">Карты соперника</div>
                <div id="opponentCards" class="flex gap-2 flex-wrap min-h-[120px]"></div>
            </div>

            <div class="bg-emerald-950 border border-emerald-700 rounded-3xl p-5">
                <div class="text-emerald-400 font-bold mb-3">Стол</div>
                <div id="table" class="min-h-[140px] flex flex-wrap gap-3"></div>
                <div class="mt-4 flex gap-3">
                    <button onclick="sendBeat()" class="flex-1 py-3 bg-emerald-600 hover:bg-emerald-500 rounded-2xl font-semibold">Бито</button>
                    <button onclick="takeCards()" class="flex-1 py-3 bg-red-600 hover:bg-red-500 rounded-2xl font-semibold">Взять</button>
                </div>
            </div>

            <div class="bg-slate-900 border border-slate-700 rounded-3xl p-5">
                <div class="text-amber-400 font-bold mb-3">Мои карты</div>
                <div id="myCards" class="flex gap-2 flex-wrap min-h-[120px]"></div>
            </div>
        </div>

        <div class="mt-4 text-center text-sm text-slate-400" id="statusText">Ожидание начала игры...</div>
    </div>

    <script>
        let myCards = [];
        let opponentCardCount = 6;
        let table = [];
        let isMyTurn = false;

        function sendToHub(msg) {
            window.parent.postMessage(JSON.stringify(msg), '*');
        }

        window.addEventListener('message', (event) => {
            try {
                const msg = JSON.parse(event.data);
                if (msg.type === 'game_state') {
                    document.getElementById('statusText').innerHTML = msg.status || '';
                }
                if (msg.type === 'connection_ready') {
                    document.getElementById('statusText').innerHTML = 'Соединение активно. Игра началась.';
                }
            } catch(e) {}
        });

        function renderMyCards() {
            const container = document.getElementById('myCards');
            container.innerHTML = '';
            myCards.forEach((card, index) => {
                const el = document.createElement('div');
                el.className = 'card bg-white text-slate-900 cursor-pointer';
                el.innerHTML = `${card.rank}<span class="text-xl">${card.suit}</span>`;
                el.onclick = () => playCard(index);
                container.appendChild(el);
            });
        }

        function playCard(index) {
            if (!isMyTurn) return;
            const card = myCards[index];
            sendToHub({ type: 'play_card', card });
            myCards.splice(index, 1);
            renderMyCards();
        }

        function sendBeat() { sendToHub({ type: 'beat' }); }
        function takeCards() { sendToHub({ type: 'take' }); }

        function init() {
            myCards = [
                {rank: 'A', suit: '♠'}, {rank: 'K', suit: '♥'}, {rank: 'Q', suit: '♦'},
                {rank: '10', suit: '♣'}, {rank: '7', suit: '♠'}, {rank: '8', suit: '♥'}
            ];
            renderMyCards();

            setTimeout(() => {
                window.parent.postMessage(JSON.stringify({ type: 'game_loaded', game: 'cards' }), '*');
            }, 300);
        }

        window.onload = init;
    </script>
</body>
</html>
