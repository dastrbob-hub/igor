<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Сетевая Змейка</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { font-family: 'Inter', system-ui, sans-serif; }
        canvas { image-rendering: pixelated; border: 4px solid #334155; border-radius: 12px; }
    </style>
</head>
<body class="bg-slate-950 text-slate-200">
    <div class="max-w-[900px] mx-auto p-6">
        <div class="flex items-center justify-between mb-6">
            <div class="flex items-center gap-x-4">
                <div class="w-12 h-12 bg-gradient-to-br from-emerald-500 to-green-500 rounded-2xl flex items-center justify-center">
                    <span class="text-white text-3xl">🐍</span>
                </div>
                <div>
                    <h1 class="text-4xl font-bold tracking-tighter">Сетевая Змейка</h1>
                    <p class="text-slate-400">Multiplayer • 30×30 • Внутри хаба</p>
                </div>
            </div>
            <div id="connStatus" class="px-4 py-2 bg-slate-900 border border-emerald-700 rounded-3xl text-sm flex items-center gap-x-2">
                <div class="w-2.5 h-2.5 bg-emerald-400 rounded-full"></div>
                <span>Подключено через хаб</span>
            </div>
        </div>

        <div class="flex justify-center gap-x-12 mb-4">
            <div class="text-center">
                <div class="text-emerald-400 text-sm font-bold">ЗЕЛЁНАЯ</div>
                <div id="score1" class="text-5xl font-bold tabular-nums text-emerald-400">0</div>
            </div>
            <div class="text-center">
                <div class="text-blue-400 text-sm font-bold">СИНЯЯ</div>
                <div id="score2" class="text-5xl font-bold tabular-nums text-blue-400">0</div>
            </div>
        </div>

        <div class="flex justify-center">
            <canvas id="gameCanvas" width="600" height="600" class="bg-[#0a0f1a]"></canvas>
        </div>

        <div id="gameStatus" class="mt-4 text-center text-xl font-semibold h-8"></div>

        <div id="restartContainer" class="mt-4 flex justify-center hidden">
            <button onclick="restartGame()" class="px-8 py-3 bg-white text-slate-950 hover:bg-gray-200 font-bold rounded-2xl text-lg">
                Играть снова
            </button>
        </div>

        <div class="mt-3 text-center text-xs text-slate-500">Управление: Игрок 1 — Стрелки • Игрок 2 — WASD</div>
    </div>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const GRID_SIZE = 30;
        const CELL_SIZE = 20;

        let snake1 = [{x: 5, y: 15}, {x: 4, y: 15}, {x: 3, y: 15}];
        let snake2 = [{x: 24, y: 15}, {x: 25, y: 15}, {x: 26, y: 15}];
        let dir1 = {x: 1, y: 0};
        let dir2 = {x: -1, y: 0};
        let apple = {x: 15, y: 15};
        let score1 = 0;
        let score2 = 0;
        let gameRunning = false;
        let isHost = false;
        let gameOver = false;

        let keys = {};
        document.addEventListener('keydown', e => {
            keys[e.key.toLowerCase()] = true;
            if (gameRunning && !gameOver) handleInput(e.key.toLowerCase());
        });

        function handleInput(key) {
            if (isHost) {
                if (key === 'arrowup' && dir1.y !== 1) dir1 = {x: 0, y: -1};
                if (key === 'arrowdown' && dir1.y !== -1) dir1 = {x: 0, y: 1};
                if (key === 'arrowleft' && dir1.x !== 1) dir1 = {x: -1, y: 0};
                if (key === 'arrowright' && dir1.x !== -1) dir1 = {x: 1, y: 0};
            } else {
                if ((key === 'w' || key === 'arrowup') && dir2.y !== 1) dir2 = {x: 0, y: -1};
                if ((key === 's' || key === 'arrowdown') && dir2.y !== -1) dir2 = {x: 0, y: 1};
                if ((key === 'a' || key === 'arrowleft') && dir2.x !== 1) dir2 = {x: -1, y: 0};
                if ((key === 'd' || key === 'arrowright') && dir2.x !== -1) dir2 = {x: 1, y: 0};
            }
        }

        function draw() {
            ctx.fillStyle = '#0a0f1a';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            ctx.strokeStyle = '#1e2937';
            for (let x = 0; x <= GRID_SIZE; x++) {
                ctx.beginPath(); ctx.moveTo(x * CELL_SIZE, 0); ctx.lineTo(x * CELL_SIZE, canvas.height); ctx.stroke();
                ctx.beginPath(); ctx.moveTo(0, x * CELL_SIZE); ctx.lineTo(canvas.width, x * CELL_SIZE); ctx.stroke();
            }

            ctx.fillStyle = '#ef4444';
            ctx.fillRect(apple.x * CELL_SIZE + 2, apple.y * CELL_SIZE + 2, CELL_SIZE - 4, CELL_SIZE - 4);

            ctx.fillStyle = '#22c55e';
            snake1.forEach(seg => ctx.fillRect(seg.x * CELL_SIZE + 1, seg.y * CELL_SIZE + 1, CELL_SIZE - 2, CELL_SIZE - 2));

            ctx.fillStyle = '#3b82f6';
            snake2.forEach(seg => ctx.fillRect(seg.x * CELL_SIZE + 1, seg.y * CELL_SIZE + 1, CELL_SIZE - 2, CELL_SIZE - 2));
        }

        function updateScores() {
            document.getElementById('score1').textContent = score1;
            document.getElementById('score2').textContent = score2;
        }

        function moveSnake(snake, dir) {
            const head = {x: snake[0].x + dir.x, y: snake[0].y + dir.y};
            snake.unshift(head);
            return head;
        }

        function checkCollision(head, snake, otherSnake) {
            if (head.x < 0 || head.x >= GRID_SIZE || head.y < 0 || head.y >= GRID_SIZE) return true;
            for (let i = 1; i < snake.length; i++) if (head.x === snake[i].x && head.y === snake[i].y) return true;
            for (let seg of otherSnake) if (head.x === seg.x && head.y === seg.y) return true;
            return false;
        }

        function placeApple() {
            let newApple;
            do {
                newApple = { x: Math.floor(Math.random() * GRID_SIZE), y: Math.floor(Math.random() * GRID_SIZE) };
            } while (snake1.some(s => s.x === newApple.x && s.y === newApple.y) || snake2.some(s => s.x === newApple.x && s.y === newApple.y));
            return newApple;
        }

        let gameInterval = null;

        function gameLoop() {
            if (!gameRunning || gameOver) return;

            const head1 = moveSnake(snake1, dir1);
            const head2 = moveSnake(snake2, dir2);

            const coll1 = checkCollision(head1, snake1, snake2);
            const coll2 = checkCollision(head2, snake2, snake1);

            if (head1.x === apple.x && head1.y === apple.y) { score1++; apple = placeApple(); } else { snake1.pop(); }
            if (head2.x === apple.x && head2.y === apple.y) { score2++; apple = placeApple(); } else { snake2.pop(); }

            updateScores();
            draw();

            // Send state to the other player via hub
            sendToHub({ type: 'state', snake1, snake2, apple, score1, score2 });

            if (coll1 || coll2) {
                gameOver = true;
                gameRunning = false;
                document.getElementById('restartContainer').classList.remove('hidden');
                document.getElementById('gameStatus').innerHTML = coll1 
                    ? '<span class="text-red-400">ПОРАЖЕНИЕ</span> <span class="text-emerald-400">— Победа Синей!</span>' 
                    : '<span class="text-emerald-400">ПОБЕДА!</span> <span class="text-blue-400">— Зелёная победила!</span>';
                clearInterval(gameInterval);
            }
        }

        function startGame() {
            if (gameRunning) return;
            gameRunning = true;
            gameOver = false;
            document.getElementById('gameStatus').innerHTML = '';
            document.getElementById('restartContainer').classList.add('hidden');

            snake1 = [{x: 5, y: 15}, {x: 4, y: 15}, {x: 3, y: 15}];
            snake2 = [{x: 24, y: 15}, {x: 25, y: 15}, {x: 26, y: 15}];
            dir1 = {x: 1, y: 0};
            dir2 = {x: -1, y: 0};
            score1 = 0; score2 = 0;
            apple = placeApple();

            updateScores();
            draw();

            if (isHost) {
                gameInterval = setInterval(gameLoop, 140);
            }
        }

        function restartGame() {
            gameOver = false;
            gameRunning = false;
            document.getElementById('restartContainer').classList.add('hidden');
            document.getElementById('gameStatus').innerHTML = '';

            snake1 = [{x: 5, y: 15}, {x: 4, y: 15}, {x: 3, y: 15}];
            snake2 = [{x: 24, y: 15}, {x: 25, y: 15}, {x: 26, y: 15}];
            dir1 = {x: 1, y: 0};
            dir2 = {x: -1, y: 0};
            score1 = 0; score2 = 0;
            apple = placeApple();

            updateScores();
            draw();

            sendToHub({ type: 'RESTART_GAME' });

            if (isHost) {
                gameRunning = true;
                gameInterval = setInterval(gameLoop, 140);
            }
        }

        // ==================== POSTMESSAGE BRIDGE ====================
        function sendToHub(msg) {
            window.parent.postMessage(JSON.stringify(msg), '*');
        }

        window.addEventListener('message', (event) => {
            try {
                const msg = JSON.parse(event.data);

                if (msg.type === 'state' && !isHost) {
                    snake1 = msg.snake1;
                    snake2 = msg.snake2;
                    apple = msg.apple;
                    score1 = msg.score1;
                    score2 = msg.score2;
                    updateScores();
                    draw();
                }

                if (msg.type === 'RESTART_GAME') {
                    restartGame();
                }

                if (msg.type === 'connection_ready') {
                    document.getElementById('connStatus').innerHTML = `<div class="w-2.5 h-2.5 bg-emerald-400 rounded-full"></div><span>Подключено</span>`;
                    startGame();
                }

                if (msg.type === 'set_host') {
                    isHost = msg.value;
                }
            } catch(e) {}
        });

        function init() {
            draw();
            updateScores();
            document.getElementById('gameStatus').innerHTML = 'Ожидание подключения через хаб...';

            // Tell parent we loaded
            setTimeout(() => {
                window.parent.postMessage(JSON.stringify({ type: 'game_loaded', game: 'snake' }), '*');
            }, 200);
        }

        window.onload = init;
    </script>
</body>
</html>
